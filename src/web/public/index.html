    // ==============================
    // CHAT VIEW
    // ==============================

    window.newChat = function() {
      state.sessionId = null;
      switchView('chat');
      $msgs.innerHTML = `
        <div class="welcome" id="welcome">
          <div class="welcome-icon">&#x2728;</div>
          <h2>${getGreeting()}, Tim</h2>
          <p>How can I help you today?</p>
          <div class="welcome-cards">
            <div class="welcome-card" onclick="prefill('Help me build a landing page')"><strong>Build something</strong>Create a website, app, or script</div>
            <div class="welcome-card" onclick="prefill('What are my agents doing?')"><strong>Check agents</strong>See background tasks & status</div>
            <div class="welcome-card" onclick="prefill('Explain this codebase')"><strong>Understand code</strong>Get an overview of any project</div>
          </div>
        </div>`;
      renderNav();
      $input.focus();
      closeSidebar();
    };

    window.prefill = function(text) {
      switchView('chat');
      $input.value = text;
      $input.focus();
      autoResize();
    };

    window.loadSession = async function(id) {
      try {
        switchView('chat');
        const session = await api.get(`/api/sessions/${id}`);
        state.sessionId = id;
        $msgs.innerHTML = '';
        for (const m of (session.messages || [])) {
          if (m.role === 'user') addUserMsg(typeof m.content === 'string' ? m.content : '');
          else if (m.role === 'assistant' && m.content) {
            addAiMsg(m.content, false);
            if (m.tool_calls) for (const tc of m.tool_calls) addTool(tc.id, tc.name, tc.arguments || '');
          } else if (m.role === 'tool') {
            const card = document.querySelector(`[data-tid="${m.tool_call_id}"]`);
            if (card) {
              card.querySelector('.tool-detail').textContent = (typeof m.content === 'string' ? m.content : '').substring(0, 500);
              setToolStatus(card, false);
            }
          }
        }
        scroll();
        renderNav();
        closeSidebar();
      } catch (e) { console.error(e); }
    };

    window.sendMessage = async function() {
      const text = $input.value.trim();
      if (!text || state.streaming) return;
      if (state.activeView !== 'chat') switchView('chat');

      const w = $('welcome'); if (w) w.remove();

      // Show attachments in user message
      const attachNames = state.attachments.map(a => a.name);
      const displayText = attachNames.length > 0 ? `[${attachNames.join(', ')}] ${text}` : text;
      addUserMsg(displayText);

      // Gather payload
      const selectedModel = state.selectedModel || undefined;
      const payload = {
        sessionId: state.sessionId,
        message: text,
        model: selectedModel || undefined,
        attachments: state.attachments.length > 0
          ? state.attachments.map(a => ({ type: a.type, name: a.name, mimeType: a.mimeType, data: a.data }))
          : undefined,
      };

      // Clear attachments
      state.attachments.forEach(a => a.preview && URL.revokeObjectURL(a.preview));
      state.attachments = [];
      renderAttachments();

      $input.value = ''; autoResize();
      state.streaming = true;
      updateBtn();
      showThinking();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify(payload),
        });
        const reader = res.body.getReader();
        const dec = new TextDecoder();
        let buf = '', evtType = null;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += dec.decode(value, { stream: true });
          const lines = buf.split('\n'); buf = lines.pop() || '';
          for (const line of lines) {
            if (line.startsWith('event: ')) evtType = line.substring(7).trim();
            else if (line.startsWith('data: ') && evtType) { onSSE(evtType, JSON.parse(line.substring(6))); evtType = null; }
          }
        }
        finalize();
        state.sessions = await api.get('/api/sessions');
        renderNav();
      } catch { addNote('Connection lost. Please try again.'); }
      finally { state.streaming = false; updateBtn(); }
    };

    let streamEl = null, streamText = '';

    function onSSE(evt, data) {
      switch (evt) {
        case 'session': state.sessionId = data.id; break;
        case 'thinking': data.active ? showThinking() : hideThinking(); break;
        case 'token':
          hideThinking();
          if (!streamEl) { streamEl = addAiMsg('', true); streamText = ''; }
          streamText += data.text;
          streamEl.querySelector('.msg-body').textContent = streamText;
          scroll();
          break;
        case 'tool_call':
          hideThinking();
          if (streamEl && streamText) { streamEl.querySelector('.msg-body').innerHTML = renderMd(streamText); }
          streamEl = null; streamText = '';
          addTool(data.id, data.name, data.args); scroll();
          break;
        case 'tool_result': {
          const card = document.querySelector(`[data-tid="${data.id}"]`);
          if (card) {
            const detail = card.querySelector('.tool-detail');
            detail.textContent = data.result || '(no output)';
            setToolStatus(card, data.error);
            const imgMatch = (data.result || '').match(/(\/[^\s"']+\.(?:png|jpg|jpeg|gif|webp))/i);
            if (imgMatch) {
              const imgUrl = `/api/image?path=${encodeURIComponent(imgMatch[1])}`;
              const wrapper = document.createElement('div');
              wrapper.style.cssText = 'margin-top:8px;margin-left:40px';
              wrapper.innerHTML = `<img class="tool-image" src="${imgUrl}" alt="Generated image"
                onclick="event.stopPropagation();showLightbox(this.src)"
                onerror="this.style.display='none';this.nextElementSibling.style.display='block'"
                style="max-width:100%;border-radius:8px;cursor:pointer" />
                <a href="${imgUrl}" target="_blank" style="display:none;color:var(--accent);font-size:13px">Open image: ${imgMatch[1].split('/').pop()}</a>`;
              card.after(wrapper);
            }
          }
          showThinking();
          scroll();
          break;
        }
        case 'recap': showRecap(data); break;
        case 'done': finalize(); break;
        case 'error': addNote(`Error: ${data.message}`); break;
        case 'status': addNote(data.message); break;
      }
    }

    function finalize() {
      if (streamEl && streamText) streamEl.querySelector('.msg-body').innerHTML = renderMd(streamText);
      streamEl = null; streamText = '';
      hideThinking();
    }

    function addUserMsg(text) {
      const d = document.createElement('div'); d.className = 'msg msg-user';
      d.innerHTML = `<div class="msg-bubble">${esc(text)}</div>`;
      $msgs.appendChild(d); scroll(); return d;
    }

    function addAiMsg(content, streaming) {
      const d = document.createElement('div'); d.className = 'msg msg-ai';
      d.innerHTML = `<div class="msg-avatar">K</div><div class="msg-body">${streaming ? '' : renderMd(content)}</div>`;
      $msgs.appendChild(d); scroll(); return d;
    }

    function addTool(id, name, args) {
      const d = document.createElement('div'); d.className = 'tool'; d.setAttribute('data-tid', id);
      d.style.marginLeft = '40px';
      const friendly = { bash:'Running command', read_file:'Reading file', write_file:'Writing file', edit_file:'Editing file',
        glob:'Finding files', grep:'Searching code', web_fetch:'Fetching page', web_search:'Searching web',
        generate_image:'Generating image', spawn_agent:'Running sub-agent' }[name] || name;
      d.innerHTML = `
        <div class="tool-head" onclick="this.parentElement.classList.toggle('open')">
          <span class="tool-dot running"></span>
          <span class="tool-label">${esc(friendly)}</span>
          <span class="tool-summary">${esc(String(args))}</span>
          <span class="tool-chevron">&#9654;</span>
        </div>
        <div class="tool-detail">Working...</div>
      `;
      $msgs.appendChild(d); return d;
    }

    function setToolStatus(card, isError) {
      card.querySelector('.tool-dot').className = `tool-dot ${isError ? 'err' : 'done'}`;
    }

    function addNote(text) {
      const d = document.createElement('div'); d.className = 'msg';
      d.innerHTML = `<div class="msg-body" style="color:var(--text-muted);font-size:13px;font-style:italic;padding-left:40px">${esc(text)}</div>`;
      $msgs.appendChild(d); scroll();
    }

    function showRecap(data) {
      finalize();
      const d = document.createElement('div'); d.className = 'recap-banner';
      const toolList = (data.toolNames || [])
        .map(n => ({ bash:'commands', read_file:'file reads', write_file:'file writes', edit_file:'edits',
          glob:'file searches', grep:'code searches', web_fetch:'web fetches', web_search:'web searches',
          generate_image:'images', spawn_agent:'sub-agents' }[n] || n))
        .filter((v, i, a) => a.indexOf(v) === i);
      const statsHtml = [
        data.toolsUsed > 0 ? `<div class="recap-stat"><strong>${data.toolsUsed}</strong> tool call${data.toolsUsed !== 1 ? 's' : ''}</div>` : '',
        toolList.length > 0 ? `<div class="recap-stat">${toolList.join(', ')}</div>` : '',
      ].filter(Boolean).join('');
      d.innerHTML = `
        <div class="recap-header"><span>&#10003;</span> Done</div>
        ${statsHtml ? `<div class="recap-stats">${statsHtml}</div>` : ''}
      `;
      if (data.toolsUsed > 0) { $msgs.appendChild(d); scroll(); }
    }

    // Rewrite local file paths in rendered HTML to use /api/image proxy
    function proxyImages(html) {
      return html.replace(
        /(<img\s[^>]*src=["'])(\/?(?:Users|home|tmp)[^\s"']+\.(?:png|jpg|jpeg|gif|webp))(["'])/gi,
        (_, pre, filepath, post) => `${pre}/api/image?path=${encodeURIComponent(filepath)}${post}`
      );
    }

    // Render markdown with image proxy applied
    function renderMd(text) {
      return proxyImages(marked.parse(text));
    }

    window.showLightbox = function(src) {
      $('lightbox-img').src = src;
      $('lightbox').classList.add('show');
    };

    function showThinking() {
      if ($('thk')) return;
      const d = document.createElement('div'); d.id = 'thk'; d.className = 'thinking';
      d.innerHTML = '<div class="thinking-dots"><span></span><span></span><span></span></div>';
      $msgs.appendChild(d); scroll();
    }
    function hideThinking() { const e = $('thk'); if (e) e.remove(); }

    function scroll() { requestAnimationFrame(() => { $chat.scrollTop = $chat.scrollHeight; }); }

    function updateBtn() {
      const btn = $('action-btn');
      if (state.streaming) {
        btn.className = 'action-btn stop'; btn.onclick = stopStreaming;
        btn.innerHTML = '<svg viewBox="0 0 16 16" fill="currentColor"><rect x="3" y="3" width="10" height="10" rx="2"/></svg>';
      } else {
        btn.className = 'action-btn send'; btn.onclick = sendMessage;
        btn.innerHTML = '<svg viewBox="0 0 16 16" fill="currentColor"><path d="M3 13l10-5L3 3v4l6 1-6 1z"/></svg>';
      }
    }

    window.stopStreaming = async function() {
      if (state.sessionId) await api.stopChat(state.sessionId);
      state.streaming = false; finalize(); updateBtn();
    };

    // ---- Mobile ----
    window.toggleSidebar = () => $('sidebar').classList.toggle('open');
    function closeSidebar() { $('sidebar').classList.remove('open'); }

    // ---- Sidebar collapse (desktop) ----
    window.collapseSidebar = function() {
      $('sidebar').classList.add('collapsed');
      $('sidebar-expand').classList.add('show');
    };
    window.expandSidebar = function() {
      $('sidebar').classList.remove('collapsed');
      $('sidebar-expand').classList.remove('show');
    };

    // ---- Input ----
    $input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
    $input.addEventListener('input', autoResize);
    $input.addEventListener('paste', async (e) => {
      const items = Array.from(e.clipboardData?.items || []);
      for (const item of items) {
        if (item.type.startsWith('image/')) {
          e.preventDefault();
          const file = item.getAsFile();
          if (!file) continue;
          const data = await fileToBase64(file);
          const name = `pasted-image.${file.type.split('/')[1] || 'png'}`;
          state.attachments.push({ name, mimeType: file.type, data, type: 'image', preview: URL.createObjectURL(file) });
          renderAttachments();
        }
      }
    });
    function autoResize() { $input.style.height = 'auto'; $input.style.height = Math.min($input.scrollHeight, 200) + 'px'; }

    // ---- Boot ----
    init();
  </script>
</body>
</html>
