<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kai</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --bg-surface: #141414;
      --bg-elevated: #1a1a1a;
      --bg-hover: #222;
      --text: #ececec;
      --text-secondary: #999;
      --text-muted: #555;
      --accent: #6b8afd;
      --green: #34d399;
      --red: #f87171;
      --yellow: #fbbf24;
      --border: #222;
      --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      --mono: 'SF Mono', 'Fira Code', monospace;
      --radius: 16px;
    }

    html, body { height: 100%; font-family: var(--sans); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; }

    .app { display: flex; height: 100vh; }

    /* ---- Sidebar ---- */
    .sidebar {
      width: 260px; background: var(--bg-surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; flex-shrink: 0;
    }
    .sidebar-brand { padding: 20px 20px 16px; font-size: 20px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
    .new-chat-btn {
      margin: 0 12px 12px; padding: 10px 14px; background: var(--accent); border: none; border-radius: 10px;
      color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; transition: opacity .15s;
    }
    .new-chat-btn:hover { opacity: .85; }

    .sidebar-nav { flex: 1; overflow-y: auto; }
    .nav-section { padding: 16px 0 4px; }
    .nav-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); padding: 0 20px 6px; }

    .nav-item {
      display: flex; align-items: center; gap: 10px; padding: 9px 20px; cursor: pointer;
      font-size: 13px; color: var(--text-secondary); transition: all .1s; border-left: 3px solid transparent;
    }
    .nav-item:hover { background: var(--bg-hover); color: var(--text); }
    .nav-item.active { background: var(--bg-elevated); color: var(--text); border-left-color: var(--accent); }
    .nav-item .icon { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }
    .nav-item .label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .nav-item .meta { font-size: 10px; color: var(--text-muted); flex-shrink: 0; }

    .nav-empty { padding: 8px 20px; font-size: 12px; color: var(--text-muted); }

    .sidebar-footer {
      padding: 12px 16px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text-muted);
      display: flex; align-items: center; gap: 6px;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .dot.on { background: var(--green); }
    .dot.off { background: var(--red); }

    /* ---- Main ---- */
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    .chat-area { flex: 1; overflow-y: auto; }
    .messages { max-width: 720px; margin: 0 auto; padding: 24px 24px 0; }

    /* ---- Welcome ---- */
    .welcome {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; text-align: center; padding: 40px;
    }
    .welcome h2 { font-size: 28px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
    .welcome p { font-size: 15px; color: var(--text-secondary); max-width: 400px; line-height: 1.6; margin-bottom: 28px; }
    .welcome-cards { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .welcome-card {
      background: var(--bg-surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 14px 18px; font-size: 13px; color: var(--text-secondary); cursor: pointer;
      transition: all .15s; max-width: 200px; text-align: left;
    }
    .welcome-card:hover { border-color: var(--accent); color: var(--text); }
    .welcome-card strong { display: block; color: var(--text); font-size: 13px; margin-bottom: 4px; }

    /* ---- Messages ---- */
    .msg { margin-bottom: 28px; animation: fadeIn .2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }

    .msg-role { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
    .msg-role.you { color: var(--accent); }
    .msg-role.kai { color: var(--green); }

    .msg-body { font-size: 14.5px; line-height: 1.75; color: var(--text); }
    .msg-body p { margin-bottom: 12px; }
    .msg-body p:last-child { margin-bottom: 0; }
    .msg-body ul, .msg-body ol { margin: 8px 0; padding-left: 24px; }
    .msg-body li { margin-bottom: 4px; }
    .msg-body a { color: var(--accent); text-decoration: none; }
    .msg-body a:hover { text-decoration: underline; }
    .msg-body h1, .msg-body h2, .msg-body h3 { margin: 16px 0 8px; font-weight: 600; }
    .msg-body h1 { font-size: 20px; } .msg-body h2 { font-size: 17px; } .msg-body h3 { font-size: 15px; }
    .msg-body code { font-family: var(--mono); font-size: 13px; background: var(--bg-surface); padding: 2px 6px; border-radius: 4px; }
    .msg-body pre { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin: 12px 0; overflow-x: auto; }
    .msg-body pre code { background: none; padding: 0; font-size: 13px; line-height: 1.5; }
    .msg-body table { border-collapse: collapse; margin: 12px 0; width: 100%; }
    .msg-body th, .msg-body td { border: 1px solid var(--border); padding: 6px 10px; font-size: 13px; text-align: left; }
    .msg-body th { background: var(--bg-surface); font-weight: 600; }

    /* ---- Tool calls ---- */
    .tool {
      margin: 6px 0; border: 1px solid var(--border); border-radius: 10px; background: var(--bg-surface); overflow: hidden;
    }
    .tool-head {
      padding: 7px 12px; display: flex; align-items: center; gap: 8px; cursor: pointer;
      font-size: 12px; color: var(--text-secondary); user-select: none;
    }
    .tool-head:hover { background: var(--bg-hover); }
    .tool-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .tool-dot.running { background: var(--yellow); }
    .tool-dot.done { background: var(--green); }
    .tool-dot.err { background: var(--red); }
    .tool-label { font-weight: 600; color: var(--text); font-size: 12px; }
    .tool-summary { color: var(--text-muted); font-family: var(--mono); font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .tool-chevron { color: var(--text-muted); transition: transform .15s; font-size: 10px; }
    .tool.open .tool-chevron { transform: rotate(90deg); }
    .tool-detail {
      display: none; padding: 0 12px 10px; font-family: var(--mono); font-size: 11px; line-height: 1.5;
      color: var(--text-secondary); white-space: pre-wrap; word-break: break-all; max-height: 250px; overflow-y: auto;
    }
    .tool.open .tool-detail { display: block; }

    /* ---- Thinking ---- */
    .thinking { display: flex; align-items: center; gap: 8px; padding: 12px 0; color: var(--text-muted); font-size: 13px; }
    .thinking-dots span { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: var(--text-muted); animation: pulse 1.4s infinite ease-in-out; }
    .thinking-dots span:nth-child(2) { animation-delay: .2s; }
    .thinking-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes pulse { 0%,80%,100% { opacity:.3; transform:scale(.8); } 40% { opacity:1; transform:scale(1.2); } }

    /* ---- Input ---- */
    .input-area { border-top: 1px solid var(--border); padding: 16px 24px 24px; background: var(--bg); }
    .input-wrap { max-width: 720px; margin: 0 auto; position: relative; }
    .input-box {
      width: 100%; min-height: 52px; max-height: 200px; padding: 14px 52px 14px 18px;
      background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); font-family: var(--sans); font-size: 14.5px; line-height: 1.5; resize: none; outline: none;
      transition: border-color .15s;
    }
    .input-box:focus { border-color: var(--accent); }
    .input-box::placeholder { color: var(--text-muted); }

    .action-btn {
      position: absolute; right: 8px; bottom: 10px; width: 36px; height: 36px; border-radius: 10px; border: none;
      color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: opacity .15s;
    }
    .action-btn.send { background: var(--accent); }
    .action-btn.send:hover { opacity: .85; }
    .action-btn.stop { background: var(--red); }
    .action-btn svg { width: 16px; height: 16px; }

    /* ---- Agent overlay ---- */
    .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.65); z-index:100; align-items:center; justify-content:center; }
    .overlay.show { display:flex; }
    .panel {
      background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius);
      width: 90%; max-width: 580px; max-height: 80vh; overflow-y: auto; padding: 28px;
    }
    .panel-title { font-size: 18px; font-weight: 600; margin-bottom: 4px; display: flex; align-items: center; justify-content: space-between; }
    .panel-desc { font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; line-height: 1.5; }
    .panel-close { background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:20px; padding:4px; }
    .panel-close:hover { color: var(--text); }
    .panel-btn {
      padding: 8px 18px; background: var(--green); border: none; border-radius: 8px;
      color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; margin-bottom: 16px;
    }
    .panel-btn:hover { opacity: .85; }
    .panel-btn:disabled { opacity: .4; cursor: not-allowed; }
    .panel-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--text-muted); margin: 16px 0 8px; }
    .run-row { font-size: 12px; color: var(--text-secondary); padding: 4px 0; display: flex; align-items: center; gap: 6px; }
    .step-box { border: 1px solid var(--border); border-radius: 8px; margin-bottom: 6px; overflow: hidden; }
    .step-name { padding: 8px 12px; font-size: 12px; font-weight: 500; display: flex; justify-content: space-between; }
    .step-body { padding: 8px 12px; font-family: var(--mono); font-size: 11px; color: var(--text-secondary); white-space: pre-wrap; max-height: 180px; overflow-y: auto; border-top: 1px solid var(--border); }

    /* ---- Recap / Done banner ---- */
    .recap-banner {
      margin: 16px 0 24px; padding: 16px 20px; border-radius: 12px;
      background: linear-gradient(135deg, rgba(52,211,153,.08), rgba(107,138,253,.08));
      border: 1px solid rgba(52,211,153,.25);
      animation: fadeIn .3s ease;
    }
    .recap-header {
      display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
      font-size: 13px; font-weight: 600; color: var(--green);
    }
    .recap-header .check { font-size: 16px; }
    .recap-stats {
      display: flex; gap: 16px; flex-wrap: wrap;
    }
    .recap-stat {
      font-size: 12px; color: var(--text-secondary);
      display: flex; align-items: center; gap: 4px;
    }
    .recap-stat strong { color: var(--text); font-weight: 600; }

    /* ---- Inline images ---- */
    .tool-image {
      max-width: 100%; border-radius: 8px; margin-top: 8px;
      border: 1px solid var(--border); cursor: pointer;
      transition: transform .15s;
    }
    .tool-image:hover { transform: scale(1.02); }
    .image-lightbox {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85);
      z-index: 200; align-items: center; justify-content: center; cursor: pointer;
    }
    .image-lightbox.show { display: flex; }
    .image-lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }

    /* ---- Mobile ---- */
    .sidebar-toggle {
      display: none; position: fixed; top: 12px; left: 12px; z-index: 50;
      width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--border);
      background: var(--bg-surface); color: var(--text); cursor: pointer; align-items: center; justify-content: center;
    }
    @media (max-width: 768px) {
      .sidebar { position:fixed; left:0; top:0; bottom:0; z-index:40; transform:translateX(-100%); transition:transform .2s; }
      .sidebar.open { transform:translateX(0); }
      .sidebar-toggle { display: flex; }
      .messages { padding: 20px 16px 0; }
      .input-area { padding: 12px 16px 16px; }
      .welcome-cards { flex-direction: column; align-items: center; }
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>
  <div class="app">
    <button class="sidebar-toggle" onclick="toggleSidebar()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><line x1="2" y1="4" x2="14" y2="4"/><line x1="2" y1="8" x2="14" y2="8"/><line x1="2" y1="12" x2="14" y2="12"/></svg>
    </button>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">Kai</div>
      <button class="new-chat-btn" onclick="newChat()">+ New Chat</button>
      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-label">Recent</div>
          <div id="nav-chats"></div>
        </div>
        <div class="nav-section">
          <div class="nav-label">Agents</div>
          <div id="nav-agents"></div>
        </div>
      </nav>
      <div class="sidebar-footer" id="footer"></div>
    </aside>

    <main class="main">
      <div class="chat-area" id="chat-area">
        <div class="messages" id="messages">
          <div class="welcome" id="welcome">
            <h2>Hey, I'm Kai</h2>
            <p>Your AI assistant. I can write code, run commands, search the web, and manage background tasks. How can I help?</p>
            <div class="welcome-cards">
              <div class="welcome-card" onclick="prefill('Help me build a landing page')">
                <strong>Build something</strong>
                Create a website, app, or script
              </div>
              <div class="welcome-card" onclick="prefill('What are my agents doing?')">
                <strong>Check agents</strong>
                See what's running in the background
              </div>
              <div class="welcome-card" onclick="prefill('Explain this codebase')">
                <strong>Understand code</strong>
                Get an overview of any project
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="input-area">
        <div class="input-wrap">
          <textarea class="input-box" id="input" placeholder="Ask Kai anything..." rows="1" autofocus></textarea>
          <button class="action-btn send" id="action-btn" onclick="sendMessage()">
            <svg viewBox="0 0 16 16" fill="currentColor"><path d="M2.5 13.5L14 8L2.5 2.5V7L10 8L2.5 9Z"/></svg>
          </button>
        </div>
      </div>
    </main>
  </div>

  <div class="image-lightbox" id="lightbox" onclick="this.classList.remove('show')">
    <img id="lightbox-img" src="" />
  </div>

  <div class="overlay" id="overlay" onclick="if(event.target===this)closePanel()">
    <div class="panel" id="panel"></div>
  </div>

  <script type="module">
    const state = { sessionId: null, sessions: [], agents: [], streaming: false, status: null };

    marked.setOptions({ breaks: true, gfm: true });

    // ---- API ----
    const api = {
      get: (u) => fetch(u).then(r => r.json()),
      post: (u, b) => fetch(u, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(b) }).then(r => r.json()),
      stopChat: (sid) => fetch('/api/chat/stop', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({sessionId:sid}) }),
    };

    // ---- DOM ----
    const $ = id => document.getElementById(id);
    const $msgs = $('messages'), $chat = $('chat-area'), $input = $('input');

    // ---- Helpers ----
    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    function timeAgo(iso) {
      if (!iso) return '';
      const diff = Date.now() - new Date(iso).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `${hrs}h ago`;
      const days = Math.floor(hrs / 24);
      if (days < 7) return `${days}d ago`;
      return new Date(iso).toLocaleDateString();
    }

    function cronToWords(cron) {
      if (!cron) return 'Manual';
      const p = cron.split(' ');
      if (p.length !== 5) return cron;
      const [min, hr, , , dow] = p;
      const h = parseInt(hr); const ampm = h >= 12 ? 'PM' : 'AM'; const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
      const time = `${h12}:${min.padStart(2,'0')} ${ampm}`;
      if (dow === '*' && p[2] === '*') return `Daily at ${time}`;
      if (dow === '0') return `Sundays at ${time}`;
      if (dow === '1') return `Mondays at ${time}`;
      const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      if (dow !== '*') return `${days[parseInt(dow)] || dow} at ${time}`;
      return `${time}`;
    }

    function sessionLabel(s) {
      if (s.name) return s.name;
      if (s.preview) return s.preview.length > 40 ? s.preview.substring(0, 40) + '...' : s.preview;
      return 'New chat';
    }

    // ---- Init ----
    async function init() {
      try {
        const [status, sessions, agents] = await Promise.all([
          api.get('/api/status'), api.get('/api/sessions'), api.get('/api/agents'),
        ]);
        state.status = status; state.sessions = sessions; state.agents = agents;
        renderNav();
        renderFooter();
      } catch {
        $('footer').innerHTML = '<span class="dot off"></span> Connection error';
      }
    }

    // ---- Sidebar rendering ----
    function renderNav() {
      // Chats — show only ones with messages, max 10
      const chats = state.sessions.filter(s => s.messageCount > 0).slice(0, 10);
      $('nav-chats').innerHTML = chats.length === 0
        ? '<div class="nav-empty">No chats yet</div>'
        : chats.map(s => `
          <div class="nav-item ${s.id === state.sessionId ? 'active' : ''}" onclick="loadSession('${s.id}')">
            <span class="icon">\u{1F4AC}</span>
            <span class="label">${esc(sessionLabel(s))}</span>
            <span class="meta">${timeAgo(s.updatedAt)}</span>
          </div>
        `).join('');

      // Agents
      $('nav-agents').innerHTML = state.agents.length === 0
        ? '<div class="nav-empty">No agents configured</div>'
        : state.agents.map(a => {
          const statusColor = !a.lastRun ? 'var(--text-muted)' : a.lastRun.status === 'completed' ? 'var(--green)' : 'var(--red)';
          const statusText = !a.lastRun ? 'Never run' : a.lastRun.status === 'completed' ? timeAgo(a.lastRun.completedAt) : 'Failed';
          return `
            <div class="nav-item" onclick="openAgent('${a.id}')">
              <span class="icon" style="color:${statusColor}">\u{26A1}</span>
              <span class="label">${esc(a.name.replace(/^(agent-|yt-)/g, '').replace(/-/g, ' '))}</span>
              <span class="meta">${statusText}</span>
            </div>
          `;
        }).join('');
    }

    function renderFooter() {
      const s = state.status;
      if (!s) return;
      const agentCount = state.agents.length;
      $('footer').innerHTML = `
        <span class="dot ${s.daemon ? 'on' : 'off'}"></span>
        ${agentCount} agent${agentCount !== 1 ? 's' : ''} ${s.daemon ? 'active' : 'paused'}
      `;
    }

    // ---- Chat ----
    window.newChat = function() {
      state.sessionId = null;
      $msgs.innerHTML = `
        <div class="welcome" id="welcome">
          <h2>Hey, I'm Kai</h2>
          <p>Your AI assistant. I can write code, run commands, search the web, and manage background tasks. How can I help?</p>
          <div class="welcome-cards">
            <div class="welcome-card" onclick="prefill('Help me build a landing page')"><strong>Build something</strong>Create a website, app, or script</div>
            <div class="welcome-card" onclick="prefill('What are my agents doing?')"><strong>Check agents</strong>See what's running in the background</div>
            <div class="welcome-card" onclick="prefill('Explain this codebase')"><strong>Understand code</strong>Get an overview of any project</div>
          </div>
        </div>`;
      renderNav();
      $input.focus();
      closeSidebar();
    };

    window.prefill = function(text) {
      $input.value = text;
      $input.focus();
      autoResize();
    };

    window.loadSession = async function(id) {
      try {
        const session = await api.get(`/api/sessions/${id}`);
        state.sessionId = id;
        $msgs.innerHTML = '';
        for (const m of (session.messages || [])) {
          if (m.role === 'user') addUserMsg(typeof m.content === 'string' ? m.content : '');
          else if (m.role === 'assistant' && m.content) {
            addAiMsg(m.content, false);
            if (m.tool_calls) for (const tc of m.tool_calls) addTool(tc.id, tc.name, tc.arguments || '');
          } else if (m.role === 'tool') {
            const card = document.querySelector(`[data-tid="${m.tool_call_id}"]`);
            if (card) {
              card.querySelector('.tool-detail').textContent = (typeof m.content === 'string' ? m.content : '').substring(0, 500);
              setToolStatus(card, false);
            }
          }
        }
        scroll();
        renderNav();
        closeSidebar();
      } catch (e) { console.error(e); }
    };

    window.sendMessage = async function() {
      const text = $input.value.trim();
      if (!text || state.streaming) return;

      const w = $('welcome'); if (w) w.remove();
      addUserMsg(text);
      $input.value = ''; autoResize();

      state.streaming = true;
      updateBtn();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ sessionId: state.sessionId, message: text }),
        });
        const reader = res.body.getReader();
        const dec = new TextDecoder();
        let buf = '', evtType = null;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += dec.decode(value, { stream: true });
          const lines = buf.split('\n'); buf = lines.pop() || '';
          for (const line of lines) {
            if (line.startsWith('event: ')) evtType = line.substring(7).trim();
            else if (line.startsWith('data: ') && evtType) { onSSE(evtType, JSON.parse(line.substring(6))); evtType = null; }
          }
        }
        finalize();
        state.sessions = await api.get('/api/sessions');
        renderNav();
      } catch { addNote('Connection lost. Please try again.'); }
      finally { state.streaming = false; updateBtn(); }
    };

    let streamEl = null, streamText = '';

    function onSSE(evt, data) {
      switch (evt) {
        case 'session': state.sessionId = data.id; break;
        case 'thinking': data.active ? showThinking() : hideThinking(); break;
        case 'token':
          hideThinking();
          if (!streamEl) { streamEl = addAiMsg('', true); streamText = ''; }
          streamText += data.text;
          streamEl.querySelector('.msg-body').textContent = streamText;
          scroll();
          break;
        case 'tool_call': hideThinking(); addTool(data.id, data.name, data.args); scroll(); break;
        case 'tool_result': {
          const card = document.querySelector(`[data-tid="${data.id}"]`);
          if (card) {
            const detail = card.querySelector('.tool-detail');
            detail.textContent = data.result || '(no output)';
            setToolStatus(card, data.error);
            // Check if result contains an image path
            const imgMatch = (data.result || '').match(/(?:saved|wrote|generated|created|output).*?(\/[^\s"']+\.(?:png|jpg|jpeg|gif|webp))/i)
              || (data.result || '').match(/(\/[^\s"']+\.(?:png|jpg|jpeg|gif|webp))/i);
            if (imgMatch) {
              const imgPath = imgMatch[1];
              const img = document.createElement('img');
              img.className = 'tool-image';
              img.src = `/api/image?path=${encodeURIComponent(imgPath)}`;
              img.alt = 'Generated image';
              img.onclick = (e) => { e.stopPropagation(); showLightbox(img.src); };
              card.after(img);
            }
          }
          scroll();
          break;
        }
        case 'recap': showRecap(data); break;
        case 'done': finalize(); break;
        case 'error': addNote(`Error: ${data.message}`); break;
        case 'status': addNote(data.message); break;
      }
    }

    function finalize() {
      if (streamEl && streamText) streamEl.querySelector('.msg-body').innerHTML = marked.parse(streamText);
      streamEl = null; streamText = '';
      hideThinking();
    }

    // ---- DOM builders ----
    function addUserMsg(text) {
      const d = document.createElement('div'); d.className = 'msg';
      d.innerHTML = `<div class="msg-role you">You</div><div class="msg-body">${esc(text)}</div>`;
      $msgs.appendChild(d); scroll(); return d;
    }

    function addAiMsg(content, streaming) {
      const d = document.createElement('div'); d.className = 'msg';
      d.innerHTML = `<div class="msg-role kai">Kai</div><div class="msg-body">${streaming ? '' : marked.parse(content)}</div>`;
      $msgs.appendChild(d); scroll(); return d;
    }

    function addTool(id, name, args) {
      const d = document.createElement('div'); d.className = 'tool'; d.setAttribute('data-tid', id);
      const friendly = { bash:'Running command', read_file:'Reading file', write_file:'Writing file', edit_file:'Editing file',
        glob:'Finding files', grep:'Searching code', web_fetch:'Fetching page', web_search:'Searching web',
        generate_image:'Generating image', spawn_agent:'Running sub-agent' }[name] || name;
      d.innerHTML = `
        <div class="tool-head" onclick="this.parentElement.classList.toggle('open')">
          <span class="tool-dot running"></span>
          <span class="tool-label">${esc(friendly)}</span>
          <span class="tool-summary">${esc(String(args))}</span>
          <span class="tool-chevron">\u25B6</span>
        </div>
        <div class="tool-detail">Working...</div>
      `;
      $msgs.appendChild(d); return d;
    }

    function setToolStatus(card, isError) {
      const dot = card.querySelector('.tool-dot');
      dot.className = `tool-dot ${isError ? 'err' : 'done'}`;
    }

    function addNote(text) {
      const d = document.createElement('div'); d.className = 'msg';
      d.innerHTML = `<div class="msg-body" style="color:var(--text-muted);font-size:12px;font-style:italic">${esc(text)}</div>`;
      $msgs.appendChild(d); scroll();
    }

    function showRecap(data) {
      finalize(); // render any pending markdown
      const d = document.createElement('div');
      d.className = 'recap-banner';
      const toolList = (data.toolNames || [])
        .map(n => ({ bash:'commands', read_file:'file reads', write_file:'file writes', edit_file:'edits',
          glob:'file searches', grep:'code searches', web_fetch:'web fetches', web_search:'web searches',
          generate_image:'images', spawn_agent:'sub-agents' }[n] || n))
        .filter((v, i, a) => a.indexOf(v) === i);
      const statsHtml = [
        data.toolsUsed > 0 ? `<div class="recap-stat"><strong>${data.toolsUsed}</strong> tool call${data.toolsUsed !== 1 ? 's' : ''}</div>` : '',
        toolList.length > 0 ? `<div class="recap-stat">${toolList.join(', ')}</div>` : '',
      ].filter(Boolean).join('');

      d.innerHTML = `
        <div class="recap-header"><span class="check">\u2705</span> Done</div>
        ${statsHtml ? `<div class="recap-stats">${statsHtml}</div>` : ''}
      `;
      // Only show if tools were actually used (otherwise the text response is self-evident)
      if (data.toolsUsed > 0) {
        $msgs.appendChild(d);
        scroll();
      }
    }

    window.showLightbox = function(src) {
      $('lightbox-img').src = src;
      $('lightbox').classList.add('show');
    };

    function showThinking() {
      if ($('thk')) return;
      const d = document.createElement('div'); d.id = 'thk'; d.className = 'thinking';
      d.innerHTML = '<div class="thinking-dots"><span></span><span></span><span></span></div>';
      $msgs.appendChild(d); scroll();
    }
    function hideThinking() { const e = $('thk'); if (e) e.remove(); }

    function scroll() { requestAnimationFrame(() => { $chat.scrollTop = $chat.scrollHeight; }); }

    function updateBtn() {
      const btn = $('action-btn');
      if (state.streaming) {
        btn.className = 'action-btn stop'; btn.onclick = stopStreaming;
        btn.innerHTML = '<svg viewBox="0 0 16 16" fill="currentColor"><rect x="3" y="3" width="10" height="10" rx="2"/></svg>';
      } else {
        btn.className = 'action-btn send'; btn.onclick = sendMessage;
        btn.innerHTML = '<svg viewBox="0 0 16 16" fill="currentColor"><path d="M2.5 13.5L14 8L2.5 2.5V7L10 8L2.5 9Z"/></svg>';
      }
    }

    window.stopStreaming = async function() {
      if (state.sessionId) await api.stopChat(state.sessionId);
      state.streaming = false; finalize(); updateBtn();
    };

    // ---- Agent panel ----
    window.openAgent = async function(id) {
      const p = $('panel'); p.innerHTML = '<p style="color:var(--text-muted)">Loading...</p>';
      $('overlay').classList.add('show');
      try {
        const [agent, output] = await Promise.all([
          api.get(`/api/agents/${id}`), api.get(`/api/agents/${id}/output`).catch(() => null),
        ]);
        const friendlyName = agent.name.replace(/^(agent-|yt-)/g, '').replace(/-/g, ' ');
        let h = `
          <div class="panel-title">${esc(friendlyName)}<button class="panel-close" onclick="closePanel()">\u2715</button></div>
          <div class="panel-desc">
            ${agent.description ? esc(agent.description) : ''}
            ${agent.schedule ? `<br>Runs: ${cronToWords(agent.schedule)}` : ''}
          </div>
          <button class="panel-btn" id="run-btn" onclick="runAgentNow('${id}')">Run Now</button>
        `;

        // Recap summary placeholder (loaded async)
        const lastRun = agent.runs?.[0];
        if (lastRun?.status === 'completed') {
          h += `<div class="recap-banner" id="agent-recap" style="margin:12px 0">
            <div class="recap-header"><span class="check">\u2705</span> Run Complete</div>
            <div id="recap-body" class="msg-body" style="font-size:13px;margin-top:8px;color:var(--text-secondary)">Generating summary...</div>
          </div>`;
        } else if (lastRun?.status === 'failed') {
          h += `<div class="recap-banner" style="margin:12px 0;border-color:rgba(248,113,113,.25);background:linear-gradient(135deg,rgba(248,113,113,.08),rgba(107,138,253,.05))">
            <div class="recap-header" style="color:var(--red)"><span class="check">\u274C</span> Run Failed</div>
            ${lastRun.error ? `<div style="font-size:12px;color:var(--text-secondary);margin-top:4px">${esc(lastRun.error.substring(0, 200))}</div>` : ''}
          </div>`;
        }

        if (agent.runs?.length > 0) {
          h += '<div class="panel-label">History</div>';
          for (const r of agent.runs.slice(0, 5)) {
            const icon = r.status==='completed' ? '\u2705' : r.status==='failed' ? '\u274C' : '\u23F3';
            h += `<div class="run-row">${icon} ${r.status === 'completed' ? 'Completed' : r.status === 'failed' ? 'Failed' : 'Running'} ${timeAgo(r.startedAt)}</div>`;
          }
        }
        if (output?.steps?.length > 0) {
          h += '<div class="panel-label">Step Details</div>';
          for (const s of output.steps) {
            const icon = s.status==='completed' ? '\u2705' : s.status==='failed' ? '\u274C' : '\u2B1C';
            // Check for image paths in step output
            const imgMatch = s.output?.match(/(\/[^\s"']+\.(?:png|jpg|jpeg|gif|webp))/i);
            h += `<div class="step-box">
              <div class="step-name"><span>${icon} ${esc(s.name.replace(/_/g,' '))}</span></div>
              ${imgMatch ? `<div style="padding:8px 12px"><img class="tool-image" src="/api/image?path=${encodeURIComponent(imgMatch[1])}" onclick="event.stopPropagation();showLightbox(this.src)" /></div>` : ''}
              ${s.output ? `<div class="step-body">${esc(s.output.substring(0, 2000))}</div>` : ''}
              ${s.error ? `<div class="step-body" style="color:var(--red)">${esc(s.error)}</div>` : ''}
            </div>`;
          }
        }
        p.innerHTML = h;

        // Load recap async (don't block panel render)
        if (lastRun?.status === 'completed') {
          api.get(`/api/agents/${id}/recap`).then(data => {
            const body = $('recap-body');
            if (body && data.recap) {
              body.innerHTML = marked.parse(data.recap);
            } else if (body) {
              body.textContent = 'All steps completed successfully.';
            }
          }).catch(() => {
            const body = $('recap-body');
            if (body) body.textContent = 'All steps completed successfully.';
          });
        }
      } catch { p.innerHTML = '<p style="color:var(--red)">Could not load agent</p><button class="panel-close" onclick="closePanel()" style="margin-top:12px">\u2715 Close</button>'; }
    };

    window.closePanel = () => $('overlay').classList.remove('show');

    window.runAgentNow = async function(id) {
      const btn = $('run-btn'); if (btn) { btn.disabled = true; btn.textContent = 'Running...'; }
      try {
        const r = await api.post(`/api/agents/${id}/run`);
        if (btn) { btn.textContent = r.success ? 'Done!' : 'Failed'; btn.style.background = r.success ? 'var(--green)' : 'var(--red)'; }
        state.agents = await api.get('/api/agents'); renderNav();
        setTimeout(() => openAgent(id), 1000);
      } catch { if (btn) { btn.textContent = 'Error'; btn.style.background = 'var(--red)'; } }
    };

    // ---- Mobile ----
    window.toggleSidebar = () => $('sidebar').classList.toggle('open');
    function closeSidebar() { $('sidebar').classList.remove('open'); }

    // ---- Input ----
    $input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
    $input.addEventListener('input', autoResize);
    function autoResize() { $input.style.height = 'auto'; $input.style.height = Math.min($input.scrollHeight, 200) + 'px'; }

    // ---- Boot ----
    init();
  </script>
</body>
</html>
