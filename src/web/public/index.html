<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kai</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FAF9F7;
      --bg-sidebar: #F0EFEB;
      --bg-surface: #FFFFFF;
      --bg-hover: #E8E6E1;
      --bg-active: #E2E0DB;
      --text: #1A1A1A;
      --text-secondary: #6B6560;
      --text-muted: #9B958F;
      --accent: #D97706;
      --accent-light: #FEF3C7;
      --green: #059669;
      --green-light: #D1FAE5;
      --red: #DC2626;
      --red-light: #FEE2E2;
      --blue: #2563EB;
      --border: #E5E2DD;
      --border-light: #EDEBE7;
      --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      --mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      --radius: 12px;
      --radius-sm: 8px;
    }

    html, body { height: 100%; font-family: var(--sans); background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.6; -webkit-font-smoothing: antialiased; }

    .app { display: flex; height: 100vh; }

    /* ---- Sidebar ---- */
    .sidebar {
      width: 260px; background: var(--bg-sidebar); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; flex-shrink: 0;
      transition: width .2s ease, opacity .2s ease;
      overflow: hidden;
    }
    .sidebar.collapsed { width: 0; border-right: none; opacity: 0; pointer-events: none; }
    .sidebar-brand {
      padding: 20px 20px 16px; font-size: 18px; font-weight: 700; color: var(--text);
      letter-spacing: -0.3px; display: flex; align-items: center; gap: 8px;
      white-space: nowrap;
    }
    .sidebar-brand svg { color: var(--accent); }
    .sidebar-collapse-btn {
      margin-left: auto; background: none; border: none; color: var(--text-muted); cursor: pointer;
      padding: 4px; border-radius: 4px; display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .sidebar-collapse-btn:hover { color: var(--text); background: var(--bg-hover); }
    .sidebar-expand-btn {
      position: fixed; top: 12px; left: 12px; z-index: 50;
      width: 32px; height: 32px; border-radius: var(--radius-sm); border: 1px solid var(--border);
      background: var(--bg-surface); color: var(--text-muted); cursor: pointer;
      display: none; align-items: center; justify-content: center;
      box-shadow: 0 1px 4px rgba(0,0,0,.08); transition: all .15s;
    }
    .sidebar-expand-btn:hover { color: var(--text); background: var(--bg-hover); }
    .sidebar-expand-btn.show { display: flex; }

    .sidebar-tabs {
      display: flex; gap: 2px; margin: 0 12px 8px; background: var(--bg-hover); border-radius: var(--radius-sm); padding: 3px;
    }
    .sidebar-tab {
      flex: 1; padding: 7px 0; border: none; background: none; border-radius: 6px;
      font-size: 13px; font-weight: 500; color: var(--text-secondary); cursor: pointer;
      transition: all .15s; display: flex; align-items: center; justify-content: center; gap: 5px;
    }
    .sidebar-tab:hover { color: var(--text); }
    .sidebar-tab.active { background: var(--bg-surface); color: var(--text); box-shadow: 0 1px 3px rgba(0,0,0,.06); }
    .sidebar-tab svg { width: 14px; height: 14px; }

    .new-chat-btn {
      margin: 4px 12px 12px; padding: 9px 14px; background: none; border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text); font-size: 13px; font-weight: 500;
      cursor: pointer; text-align: left; transition: all .15s;
      display: flex; align-items: center; gap: 8px;
    }
    .new-chat-btn:hover { background: var(--bg-hover); }
    .new-chat-btn svg { width: 16px; height: 16px; color: var(--text-muted); }

    .sidebar-list { flex: 1; overflow-y: auto; padding: 0 8px; }
    .list-label {
      font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .8px;
      color: var(--text-muted); padding: 12px 12px 6px;
    }

    .list-item {
      display: flex; align-items: center; gap: 10px; padding: 8px 12px; cursor: pointer;
      font-size: 13.5px; color: var(--text-secondary); transition: all .1s; border-radius: var(--radius-sm);
      margin-bottom: 1px;
    }
    .list-item:hover { background: var(--bg-hover); color: var(--text); }
    .list-item.active { background: var(--bg-active); color: var(--text); }
    .list-item .icon { width: 18px; text-align: center; flex-shrink: 0; font-size: 14px; }
    .list-item .label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .list-item .meta { font-size: 11px; color: var(--text-muted); flex-shrink: 0; }
    .list-item .delete-btn {
      display: none; flex-shrink: 0;
      background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 2px 6px;
      border-radius: 4px; font-size: 13px; line-height: 1;
    }
    .list-item:hover .meta { display: none; }
    .list-item:hover .delete-btn { display: block; }
    .list-item .delete-btn:hover { color: var(--red); background: var(--red-light); }

    .list-empty { padding: 12px; font-size: 13px; color: var(--text-muted); }

    .sidebar-footer {
      padding: 12px 16px; border-top: 1px solid var(--border); font-size: 12px; color: var(--text-muted);
      display: flex; align-items: center; gap: 8px;
    }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .status-dot.on { background: var(--green); }
    .status-dot.off { background: var(--red); }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ---- Main ---- */
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg); }

    /* ---- View switching ---- */
    .view { display: none; flex-direction: column; height: 100%; }
    .view.active { display: flex; }

    /* ---- Chat view ---- */
    .chat-area { flex: 1; overflow-y: auto; }
    .messages { max-width: 680px; margin: 0 auto; padding: 24px 24px 0; }

    .welcome {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; text-align: center; padding: 40px;
    }
    .welcome-icon { font-size: 32px; margin-bottom: 16px; }
    .welcome h2 { font-size: 28px; font-weight: 600; margin-bottom: 8px; color: var(--text); letter-spacing: -0.5px; }
    .welcome p { font-size: 15px; color: var(--text-secondary); max-width: 440px; line-height: 1.7; margin-bottom: 32px; }
    .welcome-cards { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .welcome-card {
      background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 14px 18px; font-size: 13px; color: var(--text-secondary); cursor: pointer;
      transition: all .15s; max-width: 200px; text-align: left; line-height: 1.5;
    }
    .welcome-card:hover { border-color: var(--accent); background: var(--accent-light); }
    .welcome-card strong { display: block; color: var(--text); font-size: 13.5px; margin-bottom: 3px; }

    .msg { margin-bottom: 24px; animation: fadeIn .2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }

    .msg-user { display: flex; justify-content: flex-end; }
    .msg-user .msg-bubble {
      background: var(--text); color: #fff; border-radius: 20px 20px 4px 20px;
      padding: 10px 16px; max-width: 80%; font-size: 14.5px; line-height: 1.6;
    }

    .msg-ai { display: flex; gap: 12px; align-items: flex-start; }
    .msg-avatar {
      width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), #B45309);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px;
      font-size: 13px; color: #fff; font-weight: 700;
    }
    .msg-body { font-size: 14.5px; line-height: 1.75; color: var(--text); flex: 1; min-width: 0; }
    .msg-body p { margin-bottom: 12px; }
    .msg-body p:last-child { margin-bottom: 0; }
    .msg-body ul, .msg-body ol { margin: 8px 0; padding-left: 24px; }
    .msg-body li { margin-bottom: 4px; }
    .msg-body a { color: var(--blue); text-decoration: none; }
    .msg-body a:hover { text-decoration: underline; }
    .msg-body h1, .msg-body h2, .msg-body h3 { margin: 16px 0 8px; font-weight: 600; }
    .msg-body h1 { font-size: 20px; } .msg-body h2 { font-size: 17px; } .msg-body h3 { font-size: 15px; }
    .msg-body code { font-family: var(--mono); font-size: 13px; background: #F3F1ED; padding: 2px 6px; border-radius: 4px; }
    .msg-body pre { background: #1E1E1E; border-radius: var(--radius-sm); padding: 14px 16px; margin: 12px 0; overflow-x: auto; }
    .msg-body pre code { background: none; padding: 0; font-size: 13px; line-height: 1.5; color: #D4D4D4; }
    .msg-body table { border-collapse: collapse; margin: 12px 0; width: 100%; }
    .msg-body th, .msg-body td { border: 1px solid var(--border); padding: 8px 12px; font-size: 13px; text-align: left; }
    .msg-body th { background: var(--bg-sidebar); font-weight: 600; }

    .tool {
      margin: 8px 0; border: 1px solid var(--border-light); border-radius: var(--radius-sm);
      background: var(--bg-surface); overflow: hidden;
    }
    .tool-head {
      padding: 8px 12px; display: flex; align-items: center; gap: 8px; cursor: pointer;
      font-size: 13px; color: var(--text-secondary); user-select: none;
    }
    .tool-head:hover { background: var(--bg-hover); }
    .tool-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .tool-dot.running { background: var(--accent); animation: pulse 1.5s infinite; }
    .tool-dot.done { background: var(--green); }
    .tool-dot.err { background: var(--red); }
    .tool-label { font-weight: 600; color: var(--text); font-size: 13px; }
    .tool-summary { color: var(--text-muted); font-family: var(--mono); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .tool-chevron { color: var(--text-muted); transition: transform .15s; font-size: 10px; }
    .tool.open .tool-chevron { transform: rotate(90deg); }
    .tool-detail {
      display: none; padding: 0 12px 10px; font-family: var(--mono); font-size: 12px; line-height: 1.5;
      color: var(--text-secondary); white-space: pre-wrap; word-break: break-all; max-height: 250px; overflow-y: auto;
    }
    .tool.open .tool-detail { display: block; }

    .thinking { display: flex; align-items: center; gap: 10px; padding: 12px 0; padding-left: 40px; color: var(--text-muted); font-size: 13px; }
    .thinking-dots span { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: bounce 1.4s infinite ease-in-out; }
    .thinking-dots span:nth-child(2) { animation-delay: .2s; }
    .thinking-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { 0%,80%,100% { opacity:.3; transform:scale(.8); } 40% { opacity:1; transform:scale(1.2); } }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }

    /* Model selector bar */
    .chat-header {
      display: flex; align-items: center; justify-content: center; padding: 12px 24px;
      border-bottom: 1px solid var(--border-light); background: var(--bg); flex-shrink: 0;
    }
    .model-picker {
      display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px 6px 10px;
      background: var(--bg-surface); border: 1px solid var(--border); border-radius: 20px;
      cursor: pointer; transition: all .15s; position: relative;
    }
    .model-picker:hover { border-color: var(--text-muted); box-shadow: 0 1px 4px rgba(0,0,0,.06); }
    .model-picker-icon {
      width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .model-picker-name { font-size: 13px; font-weight: 500; color: var(--text); }
    .model-picker-arrow { font-size: 10px; color: var(--text-muted); margin-left: 2px; }
    .model-dropdown {
      display: none; position: absolute; top: calc(100% + 6px); left: 50%; transform: translateX(-50%);
      background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius);
      box-shadow: 0 8px 30px rgba(0,0,0,.12); min-width: 280px; z-index: 50; overflow: hidden;
      padding: 4px;
    }
    .model-dropdown.show { display: block; }
    .model-option {
      display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: var(--radius-sm);
      cursor: pointer; transition: background .1s; font-size: 13px;
    }
    .model-option:hover { background: var(--bg-hover); }
    .model-option.active { background: var(--accent-light); }
    .model-option-icon {
      width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .model-option-info { flex: 1; }
    .model-option-name { font-weight: 500; color: var(--text); }
    .model-option-desc { font-size: 11px; color: var(--text-muted); }
    .model-option-check { color: var(--accent); font-size: 14px; font-weight: 700; }

    .input-area { padding: 16px 24px 28px; background: var(--bg); }
    .input-wrap {
      max-width: 680px; margin: 0 auto; position: relative;
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: 24px; transition: border-color .15s, box-shadow .15s;
    }
    .input-wrap:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(217,119,6,.1); }
    .attachments-bar {
      display: flex; gap: 6px; flex-wrap: wrap; padding: 8px 16px 0; align-items: center;
    }
    .attachments-bar:empty { display: none; }
    .attach-chip {
      display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px 3px 6px;
      background: var(--bg-hover); border-radius: 14px; font-size: 12px; color: var(--text-secondary);
      max-width: 200px;
    }
    .attach-chip img {
      width: 22px; height: 22px; border-radius: 4px; object-fit: cover;
    }
    .attach-chip .chip-icon {
      width: 16px; height: 16px; display: flex; align-items: center; justify-content: center;
      color: var(--text-muted);
    }
    .attach-chip .chip-name {
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1;
    }
    .attach-chip .chip-remove {
      cursor: pointer; color: var(--text-muted); font-size: 14px; line-height: 1;
      margin-left: 2px; border: none; background: none; padding: 0;
    }
    .attach-chip .chip-remove:hover { color: var(--red); }
    .input-row { display: flex; align-items: flex-end; }
    .attach-btn {
      width: 36px; height: 36px; border: none; background: none; color: var(--text-muted);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-left: 4px; margin-bottom: 8px; border-radius: 50%; transition: all .15s;
    }
    .attach-btn:hover { color: var(--text); background: var(--bg-hover); }
    .attach-btn svg { width: 18px; height: 18px; }
    .input-box {
      width: 100%; min-height: 52px; max-height: 200px; padding: 14px 52px 14px 4px;
      background: transparent; border: none; border-radius: 24px;
      color: var(--text); font-family: var(--sans); font-size: 15px; line-height: 1.5; resize: none; outline: none;
    }
    .input-box::placeholder { color: var(--text-muted); }

    .action-btn {
      position: absolute; right: 8px; bottom: 8px; width: 36px; height: 36px; border-radius: 50%; border: none;
      color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s;
    }
    .action-btn.send { background: var(--text); }
    .action-btn.send:hover { background: #333; }
    .action-btn.stop { background: var(--red); }
    .action-btn svg { width: 16px; height: 16px; }

    .recap-banner {
      margin: 16px 0 24px; margin-left: 40px; padding: 14px 18px; border-radius: var(--radius);
      background: var(--green-light); border: 1px solid rgba(5,150,105,.2);
      animation: fadeIn .3s ease;
    }
    .recap-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 13px; font-weight: 600; color: var(--green); }
    .recap-stats { display: flex; gap: 14px; flex-wrap: wrap; }
    .recap-stat { font-size: 12px; color: var(--text-secondary); display: flex; align-items: center; gap: 4px; }
    .recap-stat strong { color: var(--text); font-weight: 600; }

    .tool-image {
      max-width: 100%; border-radius: var(--radius-sm); margin-top: 8px;
      border: 1px solid var(--border); cursor: pointer; transition: transform .15s;
    }
    .tool-image:hover { transform: scale(1.02); }
    .image-lightbox {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85);
      z-index: 200; align-items: center; justify-content: center; cursor: pointer;
    }
    .image-lightbox.show { display: flex; }
    .image-lightbox img { max-width: 90vw; max-height: 90vh; border-radius: var(--radius-sm); }

    /* ======================================= */
    /* ---- Agents view ---- */
    /* ======================================= */
    .agents-view { display: flex; height: 100%; }

    .agents-list-panel {
      width: 280px; border-right: 1px solid var(--border); background: var(--bg);
      display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto;
    }
    .agents-list-header {
      padding: 20px 20px 12px; font-size: 18px; font-weight: 600; color: var(--text);
      border-bottom: 1px solid var(--border-light);
    }

    .agent-card {
      padding: 14px 20px; border-bottom: 1px solid var(--border-light); cursor: pointer;
      transition: background .1s;
    }
    .agent-card:hover { background: var(--bg-hover); }
    .agent-card.active { background: var(--accent-light); border-left: 3px solid var(--accent); }
    .agent-card-name { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
    .agent-card-meta { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
    .agent-card-status {
      display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600;
      padding: 2px 8px; border-radius: 10px;
    }
    .agent-card-status.completed { background: var(--green-light); color: var(--green); }
    .agent-card-status.failed { background: var(--red-light); color: var(--red); }
    .agent-card-status.never { background: var(--bg-hover); color: var(--text-muted); }
    .agent-card-status.disabled { background: var(--bg-hover); color: var(--text-muted); }

    .agents-detail-panel {
      flex: 1; overflow-y: auto; padding: 0;
    }

    .agents-empty {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; color: var(--text-muted); font-size: 14px; gap: 8px;
    }
    .agents-empty svg { width: 40px; height: 40px; opacity: .3; }

    /* Agent detail */
    .agent-detail { max-width: 740px; margin: 0 auto; padding: 28px 32px; }

    .agent-detail-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; }
    .agent-detail-title { font-size: 22px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; }
    .agent-detail-desc { font-size: 14px; color: var(--text-secondary); margin-top: 4px; line-height: 1.6; }
    .agent-detail-schedule { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

    .agent-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }

    .toggle-wrap {
      display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-secondary);
    }
    .toggle {
      width: 40px; height: 22px; border-radius: 11px; border: none; cursor: pointer;
      position: relative; transition: background .2s; background: var(--bg-hover);
    }
    .toggle.on { background: var(--green); }
    .toggle::after {
      content: ''; position: absolute; top: 3px; left: 3px;
      width: 16px; height: 16px; border-radius: 50%; background: #fff;
      transition: transform .2s; box-shadow: 0 1px 3px rgba(0,0,0,.15);
    }
    .toggle.on::after { transform: translateX(18px); }

    .btn {
      padding: 8px 18px; border: none; border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-primary { background: var(--text); color: #fff; }
    .btn-primary:hover { background: #333; }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
    .btn-ghost { background: none; color: var(--text-secondary); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--bg-hover); color: var(--text); }
    .btn-danger { background: none; color: var(--red); border: 1px solid rgba(220,38,38,.3); }
    .btn-danger:hover { background: var(--red-light); }
    .btn-fix { background: var(--accent); color: #fff; }
    .btn-fix:hover { background: #B45309; }

    /* Edit form */
    .edit-form { margin-bottom: 24px; animation: fadeIn .2s ease; }
    .edit-field { margin-bottom: 14px; }
    .edit-label { display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px; }
    .edit-input, .edit-textarea {
      width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
      font-family: var(--sans); font-size: 13px; color: var(--text); background: var(--bg-surface);
      outline: none; transition: border-color .15s;
    }
    .edit-input:focus, .edit-textarea:focus { border-color: var(--accent); }
    .edit-textarea { resize: vertical; min-height: 60px; }
    .edit-actions { display: flex; gap: 8px; margin-top: 16px; }

    /* Confirm dialog */
    .confirm-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4);
      z-index: 300; align-items: center; justify-content: center; backdrop-filter: blur(4px);
    }
    .confirm-overlay.show { display: flex; }
    .confirm-box {
      background: var(--bg-surface); border-radius: 16px; padding: 24px; max-width: 380px; width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,.15); text-align: center;
    }
    .confirm-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
    .confirm-msg { font-size: 13px; color: var(--text-secondary); margin-bottom: 20px; line-height: 1.6; }
    .confirm-actions { display: flex; gap: 8px; justify-content: center; }

    /* Agent detail tabs */
    .agent-tabs {
      display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px;
    }
    .agent-tab {
      padding: 10px 20px; border: none; background: none; font-size: 13px; font-weight: 500;
      color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent;
      transition: all .15s;
    }
    .agent-tab:hover { color: var(--text); }
    .agent-tab.active { color: var(--text); border-bottom-color: var(--accent); }

    .agent-tab-content { display: none; }
    .agent-tab-content.active { display: block; }

    /* Recap section */
    .agent-recap {
      padding: 18px 20px; border-radius: var(--radius); margin-bottom: 20px;
      background: var(--green-light); border: 1px solid rgba(5,150,105,.2);
    }
    .agent-recap.failed { background: var(--red-light); border-color: rgba(220,38,38,.2); }
    .agent-recap-title { font-size: 14px; font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .agent-recap-title.success { color: var(--green); }
    .agent-recap-title.error { color: var(--red); }
    .agent-recap-body { font-size: 13px; line-height: 1.7; color: var(--text-secondary); }
    .agent-recap-body p { margin-bottom: 8px; }
    .agent-recap-body p:last-child { margin-bottom: 0; }

    /* Steps */
    .step-card {
      border: 1px solid var(--border-light); border-radius: var(--radius-sm);
      margin-bottom: 8px; overflow: hidden; background: var(--bg-surface);
    }
    .step-header {
      padding: 10px 14px; display: flex; align-items: center; gap: 10px; cursor: pointer;
      user-select: none; transition: background .1s;
    }
    .step-header:hover { background: var(--bg-hover); }
    .step-status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .step-status-dot.completed { background: var(--green); }
    .step-status-dot.failed { background: var(--red); }
    .step-status-dot.running { background: var(--accent); animation: pulse 1.5s infinite; }
    .step-status-dot.pending { background: var(--border); }
    .step-name { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; }
    .step-tokens { font-size: 11px; color: var(--text-muted); }
    .step-chevron { color: var(--text-muted); transition: transform .15s; font-size: 10px; }
    .step-card.open .step-chevron { transform: rotate(90deg); }
    .step-output {
      display: none; border-top: 1px solid var(--border-light); padding: 14px;
      font-size: 13px; line-height: 1.7; color: var(--text-secondary);
      max-height: 500px; overflow-y: auto;
    }
    .step-card.open .step-output { display: block; }
    .step-output pre { background: #1E1E1E; border-radius: var(--radius-sm); padding: 12px 14px; margin: 8px 0; overflow-x: auto; }
    .step-output pre code { font-family: var(--mono); font-size: 12px; color: #D4D4D4; line-height: 1.5; }
    .step-output-raw {
      font-family: var(--mono); font-size: 12px; line-height: 1.5; white-space: pre-wrap;
      word-break: break-word; background: var(--bg); padding: 12px; border-radius: var(--radius-sm);
    }
    .step-error { color: var(--red); font-size: 13px; margin-top: 8px; }

    /* Runs list */
    .run-item {
      display: flex; align-items: center; gap: 12px; padding: 10px 0;
      border-bottom: 1px solid var(--border-light); cursor: pointer; transition: background .1s;
    }
    .run-item:last-child { border-bottom: none; }
    .run-item:hover { background: var(--bg-hover); margin: 0 -8px; padding: 10px 8px; border-radius: var(--radius-sm); }
    .run-item.active { background: var(--accent-light); margin: 0 -8px; padding: 10px 8px; border-radius: var(--radius-sm); }
    .run-status-badge {
      font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 10px;
    }
    .run-status-badge.completed { background: var(--green-light); color: var(--green); }
    .run-status-badge.failed { background: var(--red-light); color: var(--red); }
    .run-status-badge.running { background: var(--accent-light); color: var(--accent); }
    .run-info { flex: 1; }
    .run-info-main { font-size: 13px; color: var(--text); font-weight: 500; }
    .run-info-sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
    .run-error-preview { font-size: 12px; color: var(--red); margin-top: 2px; max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .run-arrow { color: var(--text-muted); font-size: 12px; }

    /* Logs */
    .log-entry {
      display: flex; gap: 10px; padding: 4px 0; font-size: 12px; font-family: var(--mono); line-height: 1.5;
    }
    .log-time { color: var(--text-muted); flex-shrink: 0; white-space: nowrap; }
    .log-level { font-weight: 600; flex-shrink: 0; width: 40px; }
    .log-level.info { color: var(--blue); }
    .log-level.warn { color: var(--accent); }
    .log-level.error { color: var(--red); }
    .log-msg { color: var(--text-secondary); word-break: break-word; }

    /* Run detail inline view */
    .run-detail-back {
      display: inline-flex; align-items: center; gap: 4px; font-size: 13px;
      color: var(--text-muted); cursor: pointer; margin-bottom: 16px; padding: 4px 0;
      border: none; background: none; transition: color .15s;
    }
    .run-detail-back:hover { color: var(--text); }
    .run-detail-back svg { width: 14px; height: 14px; }

    /* Spinner */
    .spinner {
      display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- Mobile ---- */
    .sidebar-toggle {
      display: none; position: fixed; top: 12px; left: 12px; z-index: 50;
      width: 36px; height: 36px; border-radius: var(--radius-sm); border: 1px solid var(--border);
      background: var(--bg-surface); color: var(--text); cursor: pointer; align-items: center; justify-content: center;
    }
    @media (max-width: 768px) {
      .sidebar { position:fixed; left:0; top:0; bottom:0; z-index:40; transform:translateX(-100%); transition:transform .2s; }
      .sidebar.open { transform:translateX(0); }
      .sidebar-toggle { display: flex; }
      .messages { padding: 20px 16px 0; }
      .input-area { padding: 12px 16px 16px; }
      .welcome-cards { flex-direction: column; align-items: center; }
      .agents-list-panel { width: 100%; }
      .agents-view { flex-direction: column; }
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  </style>
</head>
<body>
  <div class="app">
    <button class="sidebar-toggle" onclick="toggleSidebar()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><line x1="2" y1="4" x2="14" y2="4"/><line x1="2" y1="8" x2="14" y2="8"/><line x1="2" y1="12" x2="14" y2="12"/></svg>
    </button>

    <button class="sidebar-expand-btn" id="sidebar-expand" onclick="expandSidebar()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><line x1="2" y1="4" x2="14" y2="4"/><line x1="2" y1="8" x2="14" y2="8"/><line x1="2" y1="12" x2="14" y2="12"/></svg>
    </button>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        Kai
        <button class="sidebar-collapse-btn" onclick="collapseSidebar()" title="Collapse sidebar">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 2L5 8l6 6"/></svg>
        </button>
      </div>

      <div class="sidebar-tabs">
        <button class="sidebar-tab active" data-tab="chats" onclick="switchView('chat')">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 3h12v8H5l-3 3V3z"/></svg>
          Chats
        </button>
        <button class="sidebar-tab" data-tab="agents" onclick="switchView('agents')">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="3"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2"/></svg>
          Agents
        </button>
      </div>

      <div id="sidebar-chat-content">
        <button class="new-chat-btn" onclick="newChat()">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="8" y1="3" x2="8" y2="13"/><line x1="3" y1="8" x2="13" y2="8"/></svg>
          New chat
        </button>
        <div class="sidebar-list">
          <div class="list-label">Recent</div>
          <div id="nav-chats"></div>
        </div>
      </div>

      <div id="sidebar-agents-content" style="display:none;flex:1;overflow-y:auto;">
        <div class="sidebar-list">
          <div class="list-label">Your Agents</div>
          <div id="nav-agents"></div>
        </div>
      </div>

      <div class="sidebar-footer" id="footer"></div>
    </aside>

    <main class="main">
      <!-- Chat View -->
      <div class="view active" id="view-chat">
        <div class="chat-header">
          <div class="model-picker" id="model-picker" onclick="toggleModelDropdown(event)">
            <div class="model-picker-icon" id="model-picker-icon" style="background:#6366F1">K</div>
            <span class="model-picker-name" id="model-picker-name">Kimi K2.5</span>
            <span class="model-picker-arrow">&#9662;</span>
            <div class="model-dropdown" id="model-dropdown"></div>
          </div>
        </div>
        <div class="chat-area" id="chat-area">
          <div class="messages" id="messages">
            <div class="welcome" id="welcome">
              <div class="welcome-icon">&#x2728;</div>
              <h2>Good afternoon, Tim</h2>
              <p>How can I help you today?</p>
              <div class="welcome-cards">
                <div class="welcome-card" onclick="prefill('Help me build a landing page')">
                  <strong>Build something</strong>Create a website, app, or script
                </div>
                <div class="welcome-card" onclick="prefill('What are my agents doing?')">
                  <strong>Check agents</strong>See background tasks & status
                </div>
                <div class="welcome-card" onclick="prefill('Explain this codebase')">
                  <strong>Understand code</strong>Get an overview of any project
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="input-area">
          <div class="input-wrap">
            <div class="attachments-bar" id="attachments-bar"></div>
            <div class="input-row">
              <button class="attach-btn" onclick="document.getElementById('file-input').click()" title="Attach image or file">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
              </button>
              <input type="file" id="file-input" multiple accept="image/*,.txt,.md,.json,.csv,.js,.ts,.py,.html,.css,.xml,.yaml,.yml,.toml,.log" style="display:none" />
              <textarea class="input-box" id="input" placeholder="How can I help you today?" rows="1" autofocus></textarea>
              <button class="action-btn send" id="action-btn" onclick="sendMessage()">
                <svg viewBox="0 0 16 16" fill="currentColor"><path d="M3 13l10-5L3 3v4l6 1-6 1z"/></svg>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Agents View -->
      <div class="view" id="view-agents">
        <div class="agents-view">
          <div class="agents-list-panel" id="agents-list-panel"></div>
          <div class="agents-detail-panel" id="agents-detail-panel">
            <div class="agents-empty">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="4"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
              <span>Select an agent to view details</span>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="image-lightbox" id="lightbox" onclick="this.classList.remove('show')">
    <img id="lightbox-img" src="" />
  </div>

  <div class="confirm-overlay" id="confirm-overlay" onclick="if(event.target===this)closeConfirm()">
    <div class="confirm-box">
      <div class="confirm-title" id="confirm-title">Confirm</div>
      <div class="confirm-msg" id="confirm-msg">Are you sure?</div>
      <div class="confirm-actions">
        <button class="btn btn-ghost" onclick="closeConfirm()">Cancel</button>
        <button class="btn btn-danger" id="confirm-action" onclick="">Delete</button>
      </div>
    </div>
  </div>

  <script type="module">
    const state = {
      sessionId: null, sessions: [], agents: [], streaming: false, status: null,
      activeView: 'chat', selectedAgentId: null, selectedRunId: null,
      attachments: [], // { name, mimeType, data (base64), type: 'image'|'file', preview? }
    };

    marked.setOptions({ breaks: true, gfm: true });

    const api = {
      get: (u) => fetch(u).then(r => r.json()),
      post: (u, b) => fetch(u, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(b) }).then(r => r.json()),
      patch: (u, b) => fetch(u, { method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify(b) }).then(r => r.json()),
      del: (u) => fetch(u, { method:'DELETE' }).then(r => r.json()),
      stopChat: (sid) => fetch('/api/chat/stop', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({sessionId:sid}) }),
    };

    const $ = id => document.getElementById(id);
    const $msgs = $('messages'), $chat = $('chat-area'), $input = $('input');

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    function timeAgo(iso) {
      if (!iso) return '';
      const diff = Date.now() - new Date(iso).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `${hrs}h ago`;
      const days = Math.floor(hrs / 24);
      if (days < 7) return `${days}d ago`;
      return new Date(iso).toLocaleDateString();
    }

    function formatDate(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      return d.toLocaleString(undefined, { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' });
    }

    function cronToWords(cron) {
      if (!cron) return 'Manual';
      const p = cron.split(' ');
      if (p.length !== 5) return cron;
      const [min, hr, , , dow] = p;
      const h = parseInt(hr);
      if (isNaN(h)) {
        if (hr === '*') return dow === '*' ? 'Every hour' : `Hourly on ${dow}`;
        if (hr.startsWith('*/')) return `Every ${hr.slice(2)}h`;
        return cron;
      }
      const ampm = h >= 12 ? 'PM' : 'AM'; const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
      const time = `${h12}:${min.padStart(2,'0')} ${ampm}`;
      const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      if (dow === '*' && p[2] === '*') return `Daily at ${time}`;
      if (dow.includes(',')) {
        const dayNames = dow.split(',').map(d => days[parseInt(d)] || d).join(', ');
        return `${dayNames} at ${time}`;
      }
      if (dow !== '*') return `${days[parseInt(dow)] || dow} at ${time}`;
      return `${time}`;
    }

    function sessionLabel(s) {
      if (s.name) return s.name;
      if (s.preview) return s.preview.length > 40 ? s.preview.substring(0, 40) + '...' : s.preview;
      return 'New chat';
    }

    function getGreeting() {
      const h = new Date().getHours();
      if (h < 12) return 'Good morning';
      if (h < 17) return 'Good afternoon';
      return 'Good evening';
    }

    function friendlyName(name) {
      return name.replace(/^(agent-|yt-)/g, '').replace(/-/g, ' ');
    }

    // ---- View switching ----
    window.switchView = function(view) {
      state.activeView = view;
      document.querySelectorAll('.sidebar-tab').forEach(t => {
        t.classList.toggle('active', t.dataset.tab === (view === 'chat' ? 'chats' : 'agents'));
      });
      $('view-chat').classList.toggle('active', view === 'chat');
      $('view-agents').classList.toggle('active', view === 'agents');
      $('sidebar-chat-content').style.display = view === 'chat' ? '' : 'none';
      $('sidebar-agents-content').style.display = view === 'agents' ? '' : 'none';

      if (view === 'agents') renderAgentsList();
      closeSidebar();
    };

    // ---- Attachments ----
    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    document.getElementById('file-input').addEventListener('change', async (e) => {
      const files = Array.from(e.target.files || []);
      for (const file of files) {
        const isImage = file.type.startsWith('image/');
        const data = await fileToBase64(file);
        const att = { name: file.name, mimeType: file.type, data, type: isImage ? 'image' : 'file' };
        if (isImage) att.preview = URL.createObjectURL(file);
        state.attachments.push(att);
      }
      renderAttachments();
      e.target.value = '';
    });

    function renderAttachments() {
      const bar = $('attachments-bar');
      bar.innerHTML = state.attachments.map((a, i) => `
        <span class="attach-chip">
          ${a.type === 'image' ? `<img src="${a.preview}" alt="" />` : `<span class="chip-icon"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" width="14" height="14"><path d="M4 1h5l4 4v9a1 1 0 01-1 1H4a1 1 0 01-1-1V2a1 1 0 011-1z"/><path d="M9 1v4h4"/></svg></span>`}
          <span class="chip-name">${esc(a.name)}</span>
          <button class="chip-remove" onclick="removeAttachment(${i})">&times;</button>
        </span>
      `).join('');
    }

    window.removeAttachment = function(i) {
      const att = state.attachments.splice(i, 1)[0];
      if (att?.preview) URL.revokeObjectURL(att.preview);
      renderAttachments();
    };

    // ---- Models ----
    const MODELS = [
      { id: 'moonshotai/kimi-k2.5', name: 'Kimi K2.5', desc: 'Fast & capable', color: '#6366F1', letter: 'K' },
      { id: 'deepseek/deepseek-v3.2', name: 'DeepSeek V3.2', desc: 'Strong all-rounder', color: '#0EA5E9', letter: 'D' },
      { id: 'qwen/qwen3.5-397b-a17b', name: 'Qwen 3.5 397B', desc: 'Hybrid reasoning', color: '#1D4ED8', letter: 'Q' },
      { id: 'z-ai/glm-5-turbo', name: 'GLM-5 Turbo', desc: 'Fast inference', color: '#10B981', letter: 'G' },
      { id: 'minimax/minimax-m2.7', name: 'MiniMax M2.7', desc: 'Multimodal', color: '#EC4899', letter: 'M' },
      { id: 'openai/gpt-oss-120b', name: 'GPT-OSS 120B', desc: 'Open weights', color: '#10A37F', letter: 'G' },
      { id: 'xiaomi/mimo-v2-pro', name: 'MiMo V2 Pro', desc: 'Reasoning model', color: '#F97316', letter: 'M' },
      { id: 'mistralai/mistral-large-2512', name: 'Mistral Large', desc: 'Multilingual', color: '#F97316', letter: 'M' },
    ];

    state.selectedModel = null; // Set from server on init

    function renderModelDropdown() {
      const dropdown = $('model-dropdown');
      const isCustom = !MODELS.find(m => m.id === state.selectedModel);
      dropdown.innerHTML = MODELS.map(m => `
        <div class="model-option ${m.id === state.selectedModel ? 'active' : ''}" onclick="event.stopPropagation();pickModel('${m.id}')">
          <div class="model-option-icon" style="background:${m.color}">${m.letter}</div>
          <div class="model-option-info">
            <div class="model-option-name">${esc(m.name)}</div>
            <div class="model-option-desc">${esc(m.desc)}</div>
          </div>
          ${m.id === state.selectedModel ? '<span class="model-option-check">&#10003;</span>' : ''}
        </div>
      `).join('') + `
        <div style="border-top:1px solid var(--border-light);margin:4px 0;padding:8px 8px 4px">
          <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;padding:0 4px">Custom model</div>
          <form onsubmit="event.preventDefault();pickCustomModel()" onclick="event.stopPropagation()">
            <input type="text" id="custom-model-input" placeholder="e.g. xiaomi/mimo-v2-pro"
              value="${isCustom ? esc(state.selectedModel) : ''}"
              style="width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:var(--mono);color:var(--text);background:var(--bg);outline:none" />
          </form>
        </div>
      `;
    }

    function updateModelPicker() {
      const m = MODELS.find(m => m.id === state.selectedModel);
      if (m) {
        $('model-picker-icon').style.background = m.color;
        $('model-picker-icon').textContent = m.letter;
        $('model-picker-name').textContent = m.name;
      } else {
        // Custom model
        const short = state.selectedModel.split('/').pop() || state.selectedModel;
        $('model-picker-icon').style.background = '#6B7280';
        $('model-picker-icon').textContent = short[0]?.toUpperCase() || '?';
        $('model-picker-name').textContent = short;
      }
    }

    window.pickCustomModel = function() {
      const input = $('custom-model-input');
      const val = input?.value.trim();
      if (val) {
        state.selectedModel = val;
        updateModelPicker();
        $('model-dropdown').classList.remove('show');
      }
    };

    window.toggleModelDropdown = function(e) {
      e.stopPropagation();
      const dd = $('model-dropdown');
      const isOpen = dd.classList.contains('show');
      dd.classList.toggle('show');
      if (!isOpen) renderModelDropdown();
    };

    window.pickModel = function(id) {
      state.selectedModel = id;
      updateModelPicker();
      $('model-dropdown').classList.remove('show');
    };

    // Close dropdown on outside click
    document.addEventListener('click', () => {
      $('model-dropdown').classList.remove('show');
    });

    // ---- Init ----
    async function init() {
      const welcomeH2 = document.querySelector('.welcome h2');
      if (welcomeH2) welcomeH2.textContent = `${getGreeting()}, Tim`;

      try {
        const [status, sessions, agents] = await Promise.all([
          api.get('/api/status'), api.get('/api/sessions'), api.get('/api/agents'),
        ]);
        state.status = status; state.sessions = sessions; state.agents = agents;

        // Sync model picker with server's configured model
        const serverModel = (status.model || '').toLowerCase();
        const match = MODELS.find(m => serverModel.includes(m.id.split('/').pop().toLowerCase()));
        state.selectedModel = match ? match.id : (status.model || MODELS[0].id);

        renderNav();
        renderFooter();
        updateModelPicker();
      } catch {
        $('footer').innerHTML = '<span class="status-dot off"></span> Connection error';
      }
    }

    function renderNav() {
      const chats = state.sessions.filter(s => s.messageCount > 0).slice(0, 15);
      $('nav-chats').innerHTML = chats.length === 0
        ? '<div class="list-empty">No chats yet</div>'
        : chats.map(s => `
          <div class="list-item ${s.id === state.sessionId ? 'active' : ''}" onclick="loadSession('${s.id}')">
            <span class="icon"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 3h12v8H5l-3 3V3z"/></svg></span>
            <span class="label">${esc(sessionLabel(s))}</span>
            <span class="meta">${timeAgo(s.updatedAt)}</span>
            <button class="delete-btn" onclick="event.stopPropagation();confirmDeleteSession('${s.id}')" title="Delete chat">&#10005;</button>
          </div>
        `).join('');

      $('nav-agents').innerHTML = state.agents.length === 0
        ? '<div class="list-empty">No agents configured</div>'
        : state.agents.map(a => {
          const sc = !a.lastRun ? 'var(--text-muted)' : a.lastRun.status === 'completed' ? 'var(--green)' : 'var(--red)';
          return `
            <div class="list-item ${a.id === state.selectedAgentId ? 'active' : ''}" onclick="selectAgent('${a.id}')">
              <span class="icon"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="${sc}" stroke-width="1.5"><circle cx="8" cy="8" r="3"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2"/></svg></span>
              <span class="label">${esc(friendlyName(a.name))}</span>
              <span class="meta">${!a.lastRun ? '' : a.lastRun.status === 'completed' ? timeAgo(a.lastRun.completedAt) : 'Failed'}</span>
            </div>
          `;
        }).join('');
    }

    function renderFooter() {
      const s = state.status;
      if (!s) return;
      $('footer').innerHTML = `
        <span class="status-dot ${s.daemon ? 'on' : 'off'}"></span>
        ${s.daemon ? 'Connected' : 'Disconnected'} &middot; ${state.agents.length} agent${state.agents.length !== 1 ? 's' : ''}
      `;
    }

    // ==============================
    // AGENTS VIEW
    // ==============================

    function renderAgentsList() {
      const panel = $('agents-list-panel');
      let h = '<div class="agents-list-header">Agents</div>';
      if (state.agents.length === 0) {
        h += '<div style="padding:20px;color:var(--text-muted);font-size:13px">No agents configured. Use <code>kai agent create</code> to add one.</div>';
      } else {
        for (const a of state.agents) {
          const statusClass = !a.enabled ? 'disabled' : !a.lastRun ? 'never' : a.lastRun.status;
          const statusLabel = !a.enabled ? 'Disabled' : !a.lastRun ? 'Never run' : a.lastRun.status === 'completed' ? 'Completed' : 'Failed';
          h += `
            <div class="agent-card ${a.id === state.selectedAgentId ? 'active' : ''}" onclick="selectAgent('${a.id}')">
              <div class="agent-card-name">${esc(friendlyName(a.name))}</div>
              <div class="agent-card-meta">
                <span class="agent-card-status ${statusClass}">${statusLabel}</span>
                ${a.lastRun ? `<span>${timeAgo(a.lastRun.completedAt || a.lastRun.startedAt)}</span>` : ''}
                ${a.schedule ? `<span>${cronToWords(a.schedule)}</span>` : ''}
              </div>
            </div>
          `;
        }
      }
      panel.innerHTML = h;
    }

    window.selectAgent = async function(id) {
      state.selectedAgentId = id;
      state.selectedRunId = null;
      if (state.activeView !== 'agents') switchView('agents');
      renderAgentsList();
      renderNav();
      await loadAgentDetail(id);
    };

    async function loadAgentDetail(id) {
      const panel = $('agents-detail-panel');
      panel.innerHTML = '<div class="agents-empty"><div class="spinner"></div><span>Loading...</span></div>';

      try {
        const agent = await api.get(`/api/agents/${id}`);
        renderAgentDetail(agent);
      } catch {
        panel.innerHTML = '<div class="agents-empty"><span style="color:var(--red)">Failed to load agent</span></div>';
      }
    }

    function renderAgentDetail(agent) {
      const panel = $('agents-detail-panel');
      const fn = friendlyName(agent.name);
      const lastRun = agent.runs?.[0];

      panel.innerHTML = `
        <div class="agent-detail">
          <div class="agent-detail-header">
            <div>
              <div class="agent-detail-title">${esc(fn)}</div>
              ${agent.description ? `<div class="agent-detail-desc">${esc(agent.description)}</div>` : ''}
              ${agent.schedule ? `<div class="agent-detail-schedule">Schedule: ${cronToWords(agent.schedule)}</div>` : ''}
            </div>
            <div class="agent-actions">
              <div class="toggle-wrap">
                <span>${agent.enabled ? 'Enabled' : 'Disabled'}</span>
                <button class="toggle ${agent.enabled ? 'on' : ''}" id="agent-toggle" onclick="toggleAgent('${agent.id}', ${!agent.enabled})"></button>
              </div>
              <button class="btn btn-ghost" onclick="editAgent('${agent.id}')">Edit</button>
              <button class="btn btn-danger" onclick="confirmDeleteAgent('${agent.id}', '${esc(fn)}')">Delete</button>
              ${lastRun?.status === 'failed' ? `<button class="btn btn-fix" onclick="fixAgent('${agent.id}', '${esc(fn)}')">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 1l4 4-7 7-4-4 7-7z"/><path d="M4 8L1 15l7-3"/></svg>
                Fix
              </button>` : ''}
              <button class="btn btn-primary" id="run-btn" onclick="runAgentNow('${agent.id}')">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><polygon points="4,2 14,8 4,14"/></svg>
                Run Now
              </button>
            </div>
          </div>

          <div class="agent-tabs">
            <button class="agent-tab active" data-atab="overview" onclick="switchAgentTab('overview')">Overview</button>
            <button class="agent-tab" data-atab="runs" onclick="switchAgentTab('runs')">Runs (${agent.runs?.length || 0})</button>
            <button class="agent-tab" data-atab="logs" onclick="switchAgentTab('logs')">Logs</button>
          </div>

          <div class="agent-tab-content active" id="atab-overview">
            <div id="agent-recap-container"></div>
            <div id="agent-steps-container"></div>
          </div>

          <div class="agent-tab-content" id="atab-runs">
            <div id="agent-runs-list"></div>
          </div>

          <div class="agent-tab-content" id="atab-logs">
            <div id="agent-logs-container"><div class="spinner" style="margin:20px auto;display:block"></div></div>
          </div>
        </div>
      `;

      // Load overview (latest run)
      if (lastRun) {
        loadRunOverview(agent.id, lastRun);
      } else {
        $('agent-recap-container').innerHTML = '<div style="color:var(--text-muted);font-size:13px;padding:8px 0">This agent has never been run.</div>';
      }

      // Render runs list
      renderRunsList(agent);

      // Lazy-load logs when tab is clicked
    }

    async function loadRunOverview(agentId, run) {
      // Load steps
      try {
        const data = await api.get(`/api/agents/${agentId}/runs/${run.id}`);
        renderSteps(data.steps);
      } catch {
        $('agent-steps-container').innerHTML = '<div style="color:var(--text-muted);font-size:13px">Could not load steps.</div>';
      }

      // Load recap
      if (run.status === 'completed') {
        $('agent-recap-container').innerHTML = `
          <div class="agent-recap">
            <div class="agent-recap-title success">&#10003; Run Completed &middot; ${formatDate(run.completedAt || run.completed_at)}</div>
            <div class="agent-recap-body" id="recap-body"><div class="spinner"></div> Generating summary...</div>
          </div>`;
        api.get(`/api/agents/${agentId}/recap`).then(d => {
          const body = $('recap-body');
          if (body && d.recap) body.innerHTML = renderMd(d.recap);
          else if (body) body.textContent = 'All steps completed successfully.';
        }).catch(() => {
          const body = $('recap-body');
          if (body) body.textContent = 'All steps completed successfully.';
        });
      } else if (run.status === 'failed') {
        $('agent-recap-container').innerHTML = `
          <div class="agent-recap failed">
            <div class="agent-recap-title error">&#10007; Run Failed &middot; ${formatDate(run.completedAt || run.completed_at)}</div>
            ${run.error ? `<div class="agent-recap-body">${esc(run.error)}</div>` : ''}
          </div>`;
      }
    }

    function renderSteps(steps) {
      if (!steps || steps.length === 0) {
        $('agent-steps-container').innerHTML = '';
        return;
      }
      let h = '<div style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);margin:20px 0 10px">Steps</div>';
      for (const s of steps) {
        const hasOutput = s.output || s.error;
        const isMarkdown = s.output && (s.output.includes('#') || s.output.includes('**') || s.output.includes('- '));
        const imgMatch = s.output?.match(/(\/[^\s"']+\.(?:png|jpg|jpeg|gif|webp))/i);
        h += `
          <div class="step-card ${hasOutput ? '' : ''}" onclick="this.classList.toggle('open')">
            <div class="step-header">
              <span class="step-status-dot ${s.status}"></span>
              <span class="step-name">${esc(s.name.replace(/_/g, ' '))}</span>
              ${s.tokensUsed ? `<span class="step-tokens">${s.tokensUsed.toLocaleString()} tokens</span>` : ''}
              ${hasOutput ? '<span class="step-chevron">&#9654;</span>' : ''}
            </div>
            ${hasOutput ? `<div class="step-output">
              ${imgMatch ? `<div style="margin-bottom:10px"><img class="tool-image" src="/api/image?path=${encodeURIComponent(imgMatch[1])}" onclick="event.stopPropagation();showLightbox(this.src)" style="max-width:300px" /></div>` : ''}
              ${s.error ? `<div class="step-error">${esc(s.error)}</div>` : ''}
              ${s.output ? (isMarkdown ? `<div class="msg-body">${renderMd(s.output)}</div>` : `<div class="step-output-raw">${esc(s.output)}</div>`) : ''}
            </div>` : ''}
          </div>
        `;
      }
      $('agent-steps-container').innerHTML = h;
    }

    function renderRunsList(agent) {
      const runs = agent.runs || [];
      if (runs.length === 0) {
        $('agent-runs-list').innerHTML = '<div style="color:var(--text-muted);font-size:13px;padding:8px 0">No runs yet.</div>';
        return;
      }
      let h = '';
      for (const r of runs) {
        h += `
          <div class="run-item" onclick="viewRun('${agent.id}', '${r.id}')">
            <span class="run-status-badge ${r.status}">${r.status}</span>
            <div class="run-info">
              <div class="run-info-main">${formatDate(r.startedAt)}</div>
              <div class="run-info-sub">${r.trigger || 'manual'} trigger${r.completedAt ? ' &middot; completed ' + timeAgo(r.completedAt) : ''}</div>
              ${r.error ? `<div class="run-error-preview">${esc(r.error.substring(0, 100))}</div>` : ''}
            </div>
            <span class="run-arrow">&#9654;</span>
          </div>
        `;
      }
      $('agent-runs-list').innerHTML = h;
    }

    window.viewRun = async function(agentId, runId) {
      const container = $('atab-runs');
      container.innerHTML = `
        <button class="run-detail-back" onclick="backToRunsList('${agentId}')">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 2L4 8l6 6"/></svg>
          Back to runs
        </button>
        <div id="run-detail-steps"><div class="spinner" style="margin:12px 0"></div></div>
      `;
      try {
        const data = await api.get(`/api/agents/${agentId}/runs/${runId}`);
        const stepsContainer = $('run-detail-steps');
        if (!data.steps?.length) {
          stepsContainer.innerHTML = '<div style="color:var(--text-muted);font-size:13px">No step data for this run.</div>';
          return;
        }
        // Reuse renderSteps but target a different container
        let h = '';
        for (const s of data.steps) {
          const hasOutput = s.output || s.error;
          const isMarkdown = s.output && (s.output.includes('#') || s.output.includes('**') || s.output.includes('- '));
          const imgMatch = s.output?.match(/(\/[^\s"']+\.(?:png|jpg|jpeg|gif|webp))/i);
          h += `
            <div class="step-card" onclick="this.classList.toggle('open')">
              <div class="step-header">
                <span class="step-status-dot ${s.status}"></span>
                <span class="step-name">${esc(s.name.replace(/_/g, ' '))}</span>
                ${s.tokensUsed ? `<span class="step-tokens">${s.tokensUsed.toLocaleString()} tokens</span>` : ''}
                ${hasOutput ? '<span class="step-chevron">&#9654;</span>' : ''}
              </div>
              ${hasOutput ? `<div class="step-output">
                ${imgMatch ? `<div style="margin-bottom:10px"><img class="tool-image" src="/api/image?path=${encodeURIComponent(imgMatch[1])}" onclick="event.stopPropagation();showLightbox(this.src)" style="max-width:300px" /></div>` : ''}
                ${s.error ? `<div class="step-error">${esc(s.error)}</div>` : ''}
                ${s.output ? (isMarkdown ? `<div class="msg-body">${renderMd(s.output)}</div>` : `<div class="step-output-raw">${esc(s.output)}</div>`) : ''}
              </div>` : ''}
            </div>
          `;
        }
        stepsContainer.innerHTML = h;
      } catch {
        $('run-detail-steps').innerHTML = '<div style="color:var(--red);font-size:13px">Failed to load run details.</div>';
      }
    };

    window.backToRunsList = async function(agentId) {
      const agent = await api.get(`/api/agents/${agentId}`);
      renderRunsList(agent);
      // Re-activate runs tab content
      switchAgentTab('runs');
    };

    window.switchAgentTab = function(tab) {
      document.querySelectorAll('.agent-tab').forEach(t => t.classList.toggle('active', t.dataset.atab === tab));
      document.querySelectorAll('.agent-tab-content').forEach(c => c.classList.toggle('active', c.id === `atab-${tab}`));

      // Lazy-load logs
      if (tab === 'logs' && state.selectedAgentId) {
        loadAgentLogs(state.selectedAgentId);
      }
    };

    async function loadAgentLogs(agentId) {
      const container = $('agent-logs-container');
      container.innerHTML = '<div class="spinner" style="margin:12px 0"></div>';
      try {
        const logs = await api.get(`/api/agents/${agentId}/logs?limit=100`);
        if (logs.length === 0) {
          container.innerHTML = '<div style="color:var(--text-muted);font-size:13px">No logs yet.</div>';
          return;
        }
        container.innerHTML = logs.map(l => `
          <div class="log-entry">
            <span class="log-time">${formatDate(l.created_at)}</span>
            <span class="log-level ${l.level}">${l.level}</span>
            <span class="log-msg">${esc(l.message)}</span>
          </div>
        `).join('');
      } catch {
        container.innerHTML = '<div style="color:var(--red);font-size:13px">Failed to load logs.</div>';
      }
    }

    window.toggleAgent = async function(id, enabled) {
      try {
        await api.patch(`/api/agents/${id}`, { enabled });
        state.agents = await api.get('/api/agents');
        renderNav();
        renderAgentsList();
        await loadAgentDetail(id);
      } catch { /* ignore */ }
    };

    window.runAgentNow = async function(id) {
      const btn = $('run-btn');
      if (btn) { btn.disabled = true; btn.innerHTML = '<div class="spinner"></div> Running...'; }
      try {
        const r = await api.post(`/api/agents/${id}/run`);
        state.agents = await api.get('/api/agents');
        renderNav();
        renderAgentsList();
        await loadAgentDetail(id);
      } catch {
        if (btn) { btn.textContent = 'Error'; btn.style.background = 'var(--red)'; }
      }
    };

    window.fixAgent = async function(id, name) {
      // Gather error info from latest run + logs
      let errorInfo = '';
      try {
        const [output, logs] = await Promise.all([
          api.get(`/api/agents/${id}/output`).catch(() => null),
          api.get(`/api/agents/${id}/logs?limit=10`).catch(() => []),
        ]);
        if (output?.run?.error) errorInfo += `Error: ${output.run.error}\n`;
        const failedSteps = (output?.steps || []).filter(s => s.status === 'failed');
        if (failedSteps.length) errorInfo += `Failed steps: ${failedSteps.map(s => `${s.name}: ${s.error || 'unknown'}`).join('; ')}\n`;
        const errorLogs = (Array.isArray(logs) ? logs : []).filter(l => l.level === 'error').slice(0, 5);
        if (errorLogs.length) errorInfo += `Recent errors:\n${errorLogs.map(l => `- ${l.message}`).join('\n')}`;
      } catch {}

      const prompt = `My "${name}" agent (id: ${id}) is failing. Please investigate and fix it.\n\n${errorInfo}`;
      switchView('chat');
      newChat();
      $input.value = prompt;
      sendMessage();
    };

    // ==============================
    // CONFIRM / DELETE / EDIT
    // ==============================

    let confirmCallback = null;

    function showConfirm(title, msg, actionLabel, callback) {
      $('confirm-title').textContent = title;
      $('confirm-msg').textContent = msg;
      $('confirm-action').textContent = actionLabel;
      confirmCallback = callback;
      $('confirm-action').onclick = async () => {
        $('confirm-action').disabled = true;
        $('confirm-action').textContent = 'Deleting...';
        await callback();
        closeConfirm();
      };
      $('confirm-overlay').classList.add('show');
    }

    window.closeConfirm = function() {
      $('confirm-overlay').classList.remove('show');
      $('confirm-action').disabled = false;
      confirmCallback = null;
    };

    window.confirmDeleteSession = function(id) {
      showConfirm('Delete chat', 'This chat and all its messages will be permanently deleted.', 'Delete', async () => {
        try {
          await fetch(`/api/sessions/${id}`, { method: 'DELETE' });
          if (state.sessionId === id) { state.sessionId = null; newChat(); }
          state.sessions = await api.get('/api/sessions');
          renderNav();
        } catch {}
      });
    };

    window.confirmDeleteAgent = function(id, name) {
      showConfirm('Delete agent', `"${name}" and all its run history will be permanently deleted.`, 'Delete', async () => {
        try {
          await fetch(`/api/agents/${id}`, { method: 'DELETE' });
          state.agents = await api.get('/api/agents');
          state.selectedAgentId = null;
          renderNav();
          renderAgentsList();
          $('agents-detail-panel').innerHTML = `
            <div class="agents-empty">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="4"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/></svg>
              <span>Select an agent to view details</span>
            </div>`;
        } catch {}
      });
    };

    window.editAgent = async function(id) {
      const agent = await api.get(`/api/agents/${id}`);
      const fn = friendlyName(agent.name);
      const panel = $('agents-detail-panel');
      panel.innerHTML = `
        <div class="agent-detail">
          <button class="run-detail-back" onclick="selectAgent('${id}')">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 2L4 8l6 6"/></svg>
            Back
          </button>
          <h2 style="font-size:20px;font-weight:600;margin-bottom:20px">Edit Agent</h2>
          <div class="edit-form">
            <div class="edit-field">
              <label class="edit-label">Name</label>
              <input class="edit-input" id="edit-name" value="${esc(agent.name)}" />
            </div>
            <div class="edit-field">
              <label class="edit-label">Description</label>
              <textarea class="edit-textarea" id="edit-desc">${esc(agent.description || '')}</textarea>
            </div>
            <div class="edit-field">
              <label class="edit-label">Schedule (cron expression)</label>
              <input class="edit-input" id="edit-schedule" value="${esc(agent.schedule || '')}" placeholder="e.g. 0 9 * * * for daily at 9am" />
              ${agent.schedule ? `<div style="font-size:11px;color:var(--text-muted);margin-top:4px">Currently: ${cronToWords(agent.schedule)}</div>` : ''}

              <button class="btn btn-ghost" onclick="selectAgent('${id}')">Cancel</button>
            </div>
          </div>
        </div>
      `;
    };

    window.saveAgentEdit = async function(id) {
      const name = $('edit-name').value.trim();
      const description = $('edit-desc').value.trim();
      const schedule = $('edit-schedule').value.trim();
      if (!name) return;
      try {
        await api.patch(`/api/agents/${id}`, { name, description, schedule });
        state.agents = await api.get('/api/agents');
        renderNav();
        renderAgentsList();
