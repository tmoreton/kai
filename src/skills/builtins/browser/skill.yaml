id: browser
name: Browser
version: 1.0.0
description: Browse the web using Playwright - navigate pages, click elements, fill forms, take screenshots, and extract content when web_search/web_fetch aren't enough
author: kai
config_schema: {}
tools:
  - name: open
    description: Open a URL in the browser and return the page content as text. Use this when you need to navigate to a specific page and read its full content.
    parameters:
      url:
        type: string
        required: true
        description: URL to navigate to
      wait_for:
        type: string
        description: CSS selector to wait for before extracting content (optional)
  - name: click
    description: Click an element on the current page by CSS selector or text content
    parameters:
      selector:
        type: string
        description: CSS selector of the element to click
      text:
        type: string
        description: Text content of the element to click (uses getByText)
  - name: fill
    description: Fill in a form field on the current page
    parameters:
      selector:
        type: string
        required: true
        description: CSS selector of the input field
      value:
        type: string
        required: true
        description: Value to type into the field
  - name: screenshot
    description: Take a screenshot of the current page and return it as a base64 image
    parameters:
      full_page:
        type: boolean
        description: Whether to capture the full scrollable page (default false)
      selector:
        type: string
        description: CSS selector of a specific element to screenshot (optional)
  - name: evaluate
    description: Run JavaScript in the browser context and return the result. Useful for extracting structured data from a page.
    parameters:
      script:
        type: string
        required: true
        description: JavaScript code to evaluate in the page context
  - name: get_content
    description: Get the current page's text content, URL, and title without navigating
    parameters: {}
  - name: close
    description: Close the browser session to free resources
    parameters: {}
