name: Build Tauri App

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

# Prevent duplicate runs for the same ref only
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  # macOS builds are done locally due to signing/notarization complexity
  # See README.md for local build instructions

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Rust
        run: |
          rustup update stable
          rustup target add x86_64-unknown-linux-gnu

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build Tauri app
        run: cargo tauri build --target x86_64-unknown-linux-gnu

      - name: Rename artifacts
        run: |
          cd src-tauri/target/x86_64-unknown-linux-gnu/release/bundle
          for f in appimage/*.AppImage deb/*.deb; do
            [ -f "$f" ] || continue
            VERSION="${GITHUB_REF_NAME}"
            EXT="${f##*.}"
            NEW_NAME="Kai_${VERSION}_amd64.${EXT}"
            echo "Renaming $f to $NEW_NAME"
            mv "$f" "$NEW_NAME"
          done
          ls -la

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kai-linux-${{ github.ref_name }}
          path: |
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/*.AppImage
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/*.deb

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Rust
        run: |
          rustup update stable
          rustup target add x86_64-pc-windows-msvc

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0"

      - name: Build Tauri app
        run: cargo tauri build --target x86_64-pc-windows-msvc

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kai-windows-${{ github.ref_name }}
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: kai-*

      - name: List artifacts
        run: |
          echo "Downloaded artifacts:"
          find artifacts -type f -name "*.AppImage" -o -name "*.deb" -o -name "*.msi" -o -name "*.exe"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          prerelease: false
          files: |
            artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
