name: YouTube AI Assistant
description: Analyzes competitor channels, identifies trends, and generates video ideas with thumbnails
schedule: "0 */6 * * *"  # Every 6 hours

config:
  competitors:
    - UCX6OQ3DkcsbYNE6H8uQQuVA  # MrBeast
    - UCBcRF18a7Qf58cCRy5xuWwQ  # MKBHD
  niche: "tech reviews"
  max_ideas: 5

steps:
  # Step 1: Fetch recent videos from competitor channels
  - name: fetch_competitors
    type: integration
    integration: youtube
    action: get_recent_uploads
    params:
      channel_id: ${config.competitors[0]}
      max_results: 10
    output_var: competitor_videos

  # Step 2: Get trending videos in the niche
  - name: search_trending
    type: integration
    integration: youtube
    action: search_videos
    params:
      query: "${config.niche} 2026"
      order: viewCount
      max_results: 10
    output_var: trending_videos

  # Step 3: Analyze trends with LLM
  - name: analyze_trends
    type: llm
    prompt: |
      You are a YouTube content strategist. Analyze these recent competitor videos and trending content.

      ## Competitor Recent Videos:
      ${vars.competitor_videos}

      ## Trending Videos in "${config.niche}":
      ${vars.trending_videos}

      Identify:
      1. What topics are getting the most views?
      2. What title patterns are working? (numbers, questions, hooks)
      3. What thumbnail styles seem to perform well?
      4. What gaps exist that we could fill?

      Be specific and data-driven.
    output_var: trend_analysis

  # Step 4: Generate video ideas
  - name: generate_ideas
    type: llm
    prompt: |
      Based on this trend analysis, generate ${config.max_ideas} video ideas for a ${config.niche} YouTube channel.

      ## Trend Analysis:
      ${vars.trend_analysis}

      For each idea, provide:
      1. **Title** — optimized for CTR (use proven patterns from the analysis)
      2. **Hook** — first 30 seconds script (the most important part)
      3. **Outline** — 5-7 key talking points
      4. **Thumbnail concept** — describe the exact thumbnail (text, imagery, colors, emotion)
      5. **Why it will work** — reference specific trends from the analysis

      Format as a numbered list.
    output_var: video_ideas

  # Step 5: Generate thumbnail images
  - name: generate_thumbnails
    type: llm
    prompt: |
      Extract ONLY the thumbnail descriptions from these video ideas. Return each as a
      standalone image generation prompt optimized for a YouTube thumbnail (1280x720).
      Make them vivid, high-contrast, eye-catching. Include style directions.

      ${vars.video_ideas}

      Return as a JSON array of strings, e.g.: ["prompt 1", "prompt 2", ...]
    output_var: thumbnail_prompts

  # Step 6: Generate the actual thumbnail images
  - name: create_thumbnails
    type: integration
    integration: image_gen
    action: generate
    params:
      prompt: "YouTube thumbnail, high contrast, professional: tech review"
      width: 1280
      height: 720
      output_dir: ~/.kai/agent-output/thumbnails
    output_var: thumbnail_images

  # Step 7: Notify the user
  - name: notify_user
    type: notify
    params:
      title: "YouTube Assistant"
      message: "${config.max_ideas} new video ideas with thumbnails ready! Check ~/.kai/agent-output/"
