name: YouTube Weekly Deep Dive
description: Picks the 2 best video ideas from the week and creates production-ready scripts, thumbnails, titles, and SEO
schedule: "0 10 * * 0"

review:
  enabled: true
  max_iterations: 2
  review_prompt: |
    Scripts must feel natural and conversational (not AI-written).
    Hooks must create genuine curiosity in 10 seconds.
    Thumbnail concepts must be specific enough to hand to a designer.
    Shorts scripts must be punchy — no filler, every second counts.
  improve_steps:
    - long_form_script_1
    - long_form_script_2
    - shorts_scripts

config:
  channel_context: |
    TheTravellingDeveloper (formerly Reactive Nerve). 1,720 subs, 50 videos.
    Build & ship apps with the best tool for the job. AI-powered workflow.
    SwiftUI + React Native. Indie hacking, making money with code, travel lifestyle.
    Currently in Argentina.

steps:
  # === GATHER THE WEEK'S IDEAS ===

  # Get this week's daily scout outputs
  - name: get_weekly_ideas
    type: shell
    command: "kai agent output agent-yt-daily-scout generate_ideas 2>/dev/null || echo 'No daily scout data yet — will generate fresh ideas'"

  # Get competitor data for context
  - name: competitor_check
    type: integration
    integration: youtube
    action: search_videos
    params:
      query: "developer build ship indie hacker AI 2026"
      order: "viewCount"
      max_results: 10

  # Get our own recent performance
  - name: our_videos
    type: integration
    integration: youtube
    action: get_recent_uploads
    params:
      channel_id: "UCC8yAE278hIstZpHiC0VBLg"
      max_results: 5

  # === PICK THE 2 BEST IDEAS ===

  - name: pick_ideas
    type: llm
    prompt: |
      You are selecting the 2 best video ideas for TheTravellingDeveloper to produce this week.

      ## This Week's Generated Ideas:
      ${vars.get_weekly_ideas}

      ## Top Performing Videos in Our Niche Right Now:
      ${vars.competitor_check}

      ## Our Recent Videos (avoid repeating):
      ${vars.our_videos}

      ## Channel Context:
      ${config.channel_context}

      Select exactly 2 ideas:
      - **1 long-form video** (10-15 min) — the "pillar content" for the week
      - **1 short-form video** (30-60 sec) — a Shorts/Reel that can drive discovery

      For each selected idea, explain:
      1. Why this idea over the others
      2. What makes it timely (reference actual trending data)
      3. Target audience and where they'll find it (search, browse, shorts feed)

      If the weekly ideas aren't strong enough, generate better ones based on the trending data.

  # === LONG-FORM SCRIPT #1 ===

  - name: long_form_script_1
    type: llm
    prompt: |
      Write a full YouTube video script for the LONG-FORM idea selected here:

      ${vars.pick_ideas}

      ## Script Requirements:
      - **Length**: 10-15 minutes when read aloud (~1,500-2,000 words)
      - **Tone**: Conversational, like talking to a friend. NOT robotic or AI-sounding.
      - **Structure**:
        - [0:00-0:15] HOOK — Start with something unexpected. A result, a controversial take, or a visual.
        - [0:15-1:00] CONTEXT — Why this matters, what we're building, the stakes.
        - [1:00-3:00] SETUP — The problem, the tools, the plan.
        - [3:00-8:00] BUILD — The core content. Show the process. Keep energy up.
        - [8:00-10:00] RESULTS — What happened? Show the output. Revenue? Downloads?
        - [10:00-12:00] LESSONS — 3 key takeaways. What would you do differently?
        - [12:00-END] CTA — Subscribe, comment, next video tease.
      - Include [B-ROLL] and [SCREEN RECORDING] markers where relevant
      - Include specific dialogue, not just bullet points
      - Reference the travel location naturally (don't force it)
      - Mention specific tools by name (Cursor, Claude, Xcode, etc.)

      Write the FULL script. Every word that would be spoken on camera.

  # === LONG-FORM TITLES + SEO ===

  - name: long_form_seo
    type: llm
    prompt: |
      Create the full YouTube optimization package for this long-form video:

      ## Script:
      ${vars.long_form_script_1}

      Provide:
      1. **5 Title Options** — ranked by predicted CTR. Mix of:
         - Curiosity gap ("I Tried X So You Don't Have To")
         - Numbers ("I Built 3 Apps in 48 Hours")
         - Controversy ("Why I Quit React Native")
         - Result ("This App Made $2K in 24 Hours")

      2. **Description** — Full YouTube description with:
         - Compelling first 2 lines (shown in search)
         - Timestamps/chapters
         - Links (placeholder)
         - Hashtags

      3. **Tags** — 15 YouTube tags, mix of broad and long-tail

      4. **Thumbnail Concept** — Describe EXACTLY:
         - Face expression (shocked, excited, confused, determined)
         - Text overlay (MAX 3-4 words, large bold font)
         - Background (code editor, travel location, split screen)
         - Color scheme (what pops on a phone screen)
         - Reference a competitor thumbnail that works and say what to steal from it

  # === SHORTS SCRIPTS ===

  - name: shorts_scripts
    type: llm
    prompt: |
      Write 3 YouTube Shorts scripts based on the SHORT-FORM idea selected:

      ${vars.pick_ideas}

      Each Short must be:
      - **30-60 seconds** when read aloud (~75-150 words)
      - **Hook in first 2 seconds** — text on screen + spoken word
      - **One key insight** per Short — don't try to cover everything
      - **End with a cliffhanger or CTA** — "Follow for part 2" or "Would you try this?"

      Format each script as:
      ```
      SHORT #1: [Title]
      [ON SCREEN TEXT]: "..."
      [SPOKEN]: "..."
      [SHOW]: description of what's on screen
      ...
      ```

      Make them punchy. Every second counts. No filler. No "hey guys."
      These should feel like TikToks — fast cuts, high energy, immediate value.

  # === GENERATE THUMBNAILS ===

  - name: thumbnail_long
    type: integration
    integration: image_gen
    action: generate
    params:
      prompt: "YouTube thumbnail, developer with excited expression looking at laptop screen showing code, vibrant warm colors Buenos Aires cafe background, bold high contrast, dramatic lighting, cinematic quality"
      model: "black-forest-labs/FLUX.1-schnell"
      width: 1280
      height: 720
      output_dir: "~/.kai/agent-output/thumbnails/weekly"

  - name: thumbnail_short
    type: integration
    integration: image_gen
    action: generate
    params:
      prompt: "YouTube Shorts thumbnail, vertical 9:16, close-up developer face with code reflection in glasses, dark background with neon code, bold text overlay space, dramatic, modern"
      model: "black-forest-labs/FLUX.1-schnell"
      width: 720
      height: 1280
      output_dir: "~/.kai/agent-output/thumbnails/weekly"

  # === FINAL PACKAGE ===

  - name: weekly_package
    type: llm
    prompt: |
      Create a final production checklist for this week's content.

      ## Long-Form Video:
      Script: ${vars.long_form_script_1}
      SEO: ${vars.long_form_seo}

      ## Shorts:
      ${vars.shorts_scripts}

      ## Thumbnails:
      Long-form: ${vars.thumbnail_long}
      Short: ${vars.thumbnail_short}

      Format as a clean checklist:
      - [ ] Film long-form video (estimated filming time)
      - [ ] Record Shorts (estimated time)
      - [ ] Edit long-form (key editing notes)
      - [ ] Create thumbnail (specs from the concept)
      - [ ] Write description and tags (copy from SEO section)
      - [ ] Schedule upload (best day/time for this niche)
      - [ ] Cross-post Shorts to TikTok/Instagram

      Include the FINAL chosen title for each piece.

  - name: notify
    type: notify
    params:
      title: "Weekly Deep Dive Ready"
      message: "2 videos scripted with thumbnails — check kai agent output"
