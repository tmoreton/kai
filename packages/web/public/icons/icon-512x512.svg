<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14B8A6"/>
      <stop offset="50%" stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#115E59"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0F766E" flood-opacity="0.5"/>
    </filter>
    <linearGradient id="k-stroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="#E0F2F1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="118" fill="url(#bg)"/>
  <!-- Inner border highlight -->
  <rect x="3" y="3" width="506" height="506" rx="116" fill="none" stroke="white" stroke-opacity="0.15" stroke-width="2"/>
  <!-- Glass highlight -->
  <rect x="20" y="14" width="472" height="240" rx="100" fill="url(#gloss)"/>
  <!-- K mark with shadow -->
  <g filter="url(#shadow)">
    <path d="M154 128v256" stroke="url(#k-stroke)" stroke-width="42" stroke-linecap="round"/>
    <path d="M154 256l118-118" stroke="url(#k-stroke)" stroke-width="42" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M154 256l118 118" stroke="url(#k-stroke)" stroke-width="42" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Bottom edge subtle highlight -->
  <rect x="20" y="498" width="472" height="3" rx="1.5" fill="white" opacity="0.08"/>
</svg>
