<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14B8A6"/>
      <stop offset="50%" stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#115E59"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0F766E" flood-opacity="0.4"/>
    </filter>
    <linearGradient id="k-stroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="#E0F2F1"/>
    </linearGradient>
  </defs>
  <!-- Full bleed background for maskable (no rounded corners - OS handles masking) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Glass highlight -->
  <rect x="0" y="0" width="512" height="260" fill="url(#gloss)"/>
  <!-- K mark centered in safe zone (inner 80% = 410x410 centered) -->
  <g filter="url(#shadow)">
    <path d="M185 148v216" stroke="url(#k-stroke)" stroke-width="40" stroke-linecap="round"/>
    <path d="M185 256l148-108" stroke="url(#k-stroke)" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M185 256l148 108" stroke="url(#k-stroke)" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
