<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14B8A6"/>
      <stop offset="50%" stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#115E59"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0F766E" flood-opacity="0.5"/>
    </filter>
    <linearGradient id="k-stroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="#E0F2F1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="180" height="180" rx="40" fill="url(#bg)"/>
  <!-- Inner border -->
  <rect x="2" y="2" width="176" height="176" rx="39" fill="none" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <!-- Glass highlight -->
  <rect x="8" y="6" width="164" height="84" rx="34" fill="url(#gloss)"/>
  <!-- K mark -->
  <g filter="url(#shadow)">
    <path d="M60 42v96" stroke="url(#k-stroke)" stroke-width="15" stroke-linecap="round"/>
    <path d="M60 90l64-48" stroke="url(#k-stroke)" stroke-width="15" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M60 90l64 48" stroke="url(#k-stroke)" stroke-width="15" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
